// ── Ludo Game -- Real playable board (48-cell ring + bases + home) ──
const LUDO_PLAYERS = [
  {name:'You',     color:'#e05050', label:'🔴'},
  {name:'AI Blue', color:'#4080e0', label:'🔵'},
  {name:'AI Green',color:'#40b060', label:'🟢'},
  {name:'AI Gold', color:'#e0b030', label:'🟡'},
];
const LUDO_START = [0,12,24,36];
function buildLudoRing(){
  const cells=[];
  for(let c=0;c<=12;c++) cells.push({r:0,c});
  for(let r=1;r<=12;r++) cells.push({r,c:12});
  for(let c=11;c>=0;c--) cells.push({r:12,c});
  for(let r=11;r>=1;r--) cells.push({r,c:0});
  return cells;
}
const LUDO_RING = buildLudoRing();
const LUDO_BASE_AREAS = [
  {r0:1,c0:1},{r0:1,c0:8},{r0:8,c0:8},{r0:8,c0:1},
];
const LUDO_SAFE = new Set(LUDO_START);

// Build ring index map once at module level (not in component)
const LUDO_RING_MAP = {};
LUDO_RING.forEach((cell,i)=>{ LUDO_RING_MAP[`${cell.r},${cell.c}`]=i; });

function ludoAbs(player, pos){ return (LUDO_START[player]+pos)%48; }

function ludoValidMoves(player, diceVal, pieces){
  return pieces
    .filter(pc=>pc.player===player && pc.pos!==48)
    .filter(pc=> pc.pos===-1 ? diceVal===6 : true)
    .map(pc=>pc.local);
}

function ludoApplyMove(player, local, diceVal, pieces){
  const logs=[];
  const next = pieces.map(pc=>({...pc}));
  const target = next.find(pc=>pc.player===player && pc.local===local);
  if(!target) return {pieces:next, logs};
  if(target.pos===-1){
    target.pos=0;
    logs.push(`${LUDO_PLAYERS[player].label} ${LUDO_PLAYERS[player].name} enters the board!`);
  } else {
    const newPos = Math.min(48, target.pos+diceVal);
    target.pos = newPos;
    if(newPos===48){
      logs.push(`${LUDO_PLAYERS[player].label} ${LUDO_PLAYERS[player].name} gets a piece HOME! 🏆`);
    } else {
      const ai = ludoAbs(player,newPos);
      if(!LUDO_SAFE.has(ai)){
        next.forEach(pc=>{
          if(pc.player!==player && pc.pos>=0 && pc.pos<48 && ludoAbs(pc.player,pc.pos)===ai){
            pc.pos=-1;
            logs.push(`💥 ${LUDO_PLAYERS[player].name} captured ${LUDO_PLAYERS[pc.player].name}'s piece!`);
          }
        });
      }
    }
  }
  return {pieces:next, logs};
}

function ludoCheckWinner(pieces){
  for(let p=0;p<4;p++){
    if(pieces.filter(pc=>pc.player===p).every(pc=>pc.pos===48)) return p;
  }
  return null;
}

function LudoGame({onBack}) {
  const initPieces = () => {
    const arr=[];
    for(let p=0;p<4;p++) for(let i=0;i<4;i++) arr.push({player:p,local:i,pos:-1});
    return arr;
  };

  const [pieces, setPieces]       = useState(initPieces);
  const [turn,   setTurn]         = useState(0);
  const [dice,   setDice]         = useState(null);
  const [rolling, setRolling]     = useState(false);
  const [log,    setLog]          = useState(['🎲 Your turn! Roll the dice.']);
  const [over,   setOver]         = useState(null);
  const [noMove, setNoMove]       = useState(false);

  // Use a ref for pieces so AI closure always reads latest
  const piecesRef = useRef(pieces);
  useEffect(()=>{ piecesRef.current=pieces; },[pieces]);

  const addLog = msg => setLog(p=>[msg,...p.slice(0,11)]);

  /* ── Player rolls ── */
  const rollDice = () => {
    if(rolling || turn!==0 || over!==null || dice!==null) return;
    setRolling(true);
    let count=0, r=1;
    const iv = setInterval(()=>{
      r=Math.ceil(Math.random()*6); setDice(r);
      if(++count>=8){
        clearInterval(iv); setRolling(false);
        addLog(`🎲 You rolled a ${r}!`);
        const vm=ludoValidMoves(0,r,piecesRef.current);
        if(vm.length===0){
          setNoMove(true);
          setTimeout(()=>{ setNoMove(false); setDice(null); setTurn(1); addLog('😶 No valid moves -- pass.'); },1100);
        }
      }
    },80);
  };

  /* ── Player clicks piece ── */
  const movePiece = (local) => {
    if(turn!==0||!dice||rolling||over!==null) return;
    const cur=piecesRef.current;
    const vm=ludoValidMoves(0,dice,cur);
    if(!vm.includes(local)) return;
    const {pieces:next,logs}=ludoApplyMove(0,local,dice,cur);
    logs.forEach(addLog);
    setPieces(next);
    const w=ludoCheckWinner(next);
    if(w!==null){ setOver(w); addLog(w===0?'🏆🎉 YOU WIN!':'🏆 '+LUDO_PLAYERS[w].name+' wins!'); setDice(null); return; }
    if(dice===6){ addLog('🎲 Rolled 6 -- roll again!'); setDice(null); }
    else { setDice(null); setTurn(1); }
  };

  /* ── AI turn -- self-contained, reads ref not closure ── */
  const aiRunning = useRef(false);
  useEffect(()=>{
    if(turn===0 || over!==null || aiRunning.current) return;
    aiRunning.current=true;
    const player=turn;

    const doAI=()=>{
      setRolling(true);
      let count=0, r=1;
      const iv=setInterval(()=>{
        r=Math.ceil(Math.random()*6); setDice(r);
        if(++count>=6){
          clearInterval(iv); setRolling(false);
          addLog(`${LUDO_PLAYERS[player].label} ${LUDO_PLAYERS[player].name} rolled ${r}`);

          const cur=piecesRef.current;
          const vm=ludoValidMoves(player,r,cur);

          if(vm.length===0){
            addLog(`${LUDO_PLAYERS[player].label} No valid moves -- pass.`);
            setTimeout(()=>{
              setDice(null);
              aiRunning.current=false;
              setTurn((player+1)%4);
            },700);
            return;
          }

          // Heuristic pick
          let chosen=vm[0];
          const myPieces=cur.filter(pc=>pc.player===player);
          // prefer: finish > capture > enter from base > furthest
          const finisher=vm.find(loc=>{ const pc=myPieces.find(p=>p.local===loc); return pc&&Math.min(48,pc.pos+r)===48; });
          const enterer =vm.find(loc=>{ const pc=myPieces.find(p=>p.local===loc); return pc&&pc.pos===-1; });
          const capturer=vm.find(loc=>{
            const pc=myPieces.find(p=>p.local===loc);
            if(!pc||pc.pos<0) return false;
            const ai=ludoAbs(player,Math.min(48,pc.pos+r));
            return !LUDO_SAFE.has(ai) && cur.some(o=>o.player!==player&&o.pos>=0&&o.pos<48&&ludoAbs(o.player,o.pos)===ai);
          });
          const furthest=vm.reduce((best,loc)=>{ const pc=myPieces.find(p=>p.local===loc); return pc&&pc.pos>(myPieces.find(p=>p.local===best)?.pos??-2)?loc:best; },vm[0]);
          chosen=finisher??capturer??enterer??furthest;

          const {pieces:next,logs}=ludoApplyMove(player,chosen,r,cur);
          logs.forEach(addLog);
          setPieces(next);

          const w=ludoCheckWinner(next);
          setTimeout(()=>{
            setDice(null);
            aiRunning.current=false;
            if(w!==null){ setOver(w); addLog('🏆 '+LUDO_PLAYERS[w].name+' wins!'); return; }
            if(r===6){ addLog(`${LUDO_PLAYERS[player].label} Rolled 6 -- goes again!`); setTurn(player); }
            else { setTurn((player+1)%4); }
          },600);
        }
      },70);
    };

    const t=setTimeout(doAI, 850);
    return ()=>{ clearTimeout(t); };
  },[turn, over]);

  const resetGame=()=>{
    aiRunning.current=false;
    setPieces(initPieces()); setTurn(0); setDice(null); setOver(null); setNoMove(false);
    setLog(['🎲 Your turn! Roll the dice.']);
  };

  const myValidLocals=(turn===0&&dice&&!rolling&&over===null)?ludoValidMoves(0,dice,pieces):[];

  /* ── Render board ── */
  const CELL=22;
  const boardCells=[];
  for(let r=0;r<13;r++) for(let c=0;c<13;c++) boardCells.push({r,c});

  const piecesByRing={}, piecesByBase={0:[],1:[],2:[],3:[]}, piecesByHome={0:[],1:[],2:[],3:[]};
  pieces.forEach(pc=>{
    if(pc.pos===-1) piecesByBase[pc.player].push(pc);
    else if(pc.pos===48) piecesByHome[pc.player].push(pc);
    else { const ai=ludoAbs(pc.player,pc.pos); (piecesByRing[ai]=piecesByRing[ai]||[]).push(pc); }
  });

  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:14}}>← Back</button>
      <div style={{display:'flex',gap:18,flexWrap:'wrap',alignItems:'flex-start'}}>
        {/* Board */}
        <div style={{background:'linear-gradient(135deg,#1a0a2e,#0a1428)',borderRadius:'var(--r-lg)',padding:14,border:'2px solid rgba(180,77,255,0.4)',boxShadow:'0 0 40px rgba(180,77,255,0.15)'}}>
          <div style={{fontFamily:'var(--font-g)',fontWeight:700,fontSize:13,color:'#b44dff',marginBottom:10,textAlign:'center'}}>⚔ LUDO QUEST</div>
          <div style={{display:'grid',gridTemplateColumns:`repeat(13,${CELL}px)`,gridTemplateRows:`repeat(13,${CELL}px)`,gap:1,background:'rgba(255,255,255,0.06)',padding:4,borderRadius:8}}>
            {boardCells.map(({r,c})=>{
              const key=`${r},${c}`;
              const ringIdx=LUDO_RING_MAP[key];
              let type='filler', playerArea=null;
              if(ringIdx!==undefined) type='ring';
              else if(r>=5&&r<=7&&c>=5&&c<=7) type='center';
              else LUDO_BASE_AREAS.forEach((b,pi)=>{ if(r>=b.r0&&r<b.r0+4&&c>=b.c0&&c<b.c0+4){type='base';playerArea=pi;} });

              if(type==='filler') return <div key={key} style={{background:'rgba(0,0,0,0.2)',borderRadius:2}}/>;

              if(type==='ring'){
                const safeFor=LUDO_START.indexOf(ringIdx);
                const bg=safeFor>=0?LUDO_PLAYERS[safeFor].color+'28':'rgba(255,255,255,0.07)';
                const bdr=safeFor>=0?`1px solid ${LUDO_PLAYERS[safeFor].color}66`:'1px solid rgba(255,255,255,0.06)';
                const occupants=piecesByRing[ringIdx]||[];
                return (
                  <div key={key} style={{background:bg,border:bdr,borderRadius:2,display:'flex',alignItems:'center',justifyContent:'center',flexWrap:'wrap',gap:1,padding:1}}>
                    {occupants.length===0 && safeFor>=0 && <span style={{fontSize:8,color:LUDO_PLAYERS[safeFor].color,opacity:0.7}}>★</span>}
                    {occupants.map((pc,i)=>{
                      const clickable=pc.player===0&&myValidLocals.includes(pc.local);
                      return <div key={i} onClick={()=>clickable&&movePiece(pc.local)}
                        style={{width:CELL/2-2,height:CELL/2-2,borderRadius:'50%',background:LUDO_PLAYERS[pc.player].color,border:'1px solid rgba(255,255,255,0.8)',cursor:clickable?'pointer':'default',boxShadow:clickable?`0 0 5px 2px ${LUDO_PLAYERS[pc.player].color}`:'none',animation:clickable?'pulse 0.8s ease-in-out infinite':'none'}}/>;
                    })}
                  </div>
                );
              }

              if(type==='center'){
                const isMid=r===6&&c===6;
                if(isMid) return <div key={key} style={{background:'rgba(255,215,0,0.15)',border:'1px solid rgba(255,215,0,0.4)',borderRadius:2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>🏆</div>;
                const qi=(r-5)*3+(c-5);
                const qMap=[0,1,null,3,null,null,null,2,null];
                const pIdx=qMap[qi];
                const homeCount=pIdx!==null?(piecesByHome[pIdx]||[]).length:0;
                return <div key={key} style={{background:pIdx!==null?LUDO_PLAYERS[pIdx].color+'22':'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:pIdx!==null?LUDO_PLAYERS[pIdx].color:'transparent'}}>
                  {homeCount>0?'★'.repeat(homeCount):''}
                </div>;
              }

              if(type==='base'){
                const b=LUDO_BASE_AREAS[playerArea];
                const lr=r-b.r0, lc=c-b.c0;
                const slotMap={'1,1':0,'1,2':1,'2,1':2,'2,2':3};
                const slot=slotMap[`${lr},${lc}`];
                const pc=slot!==undefined?piecesByBase[playerArea].find(p=>p.local===slot):null;
                const isEdge=lr===0||lr===3||lc===0||lc===3;
                const clickable=pc&&pc.player===0&&myValidLocals.includes(pc.local);
                return <div key={key} style={{background:isEdge?LUDO_PLAYERS[playerArea].color+'22':LUDO_PLAYERS[playerArea].color+'11',border:`1px solid ${LUDO_PLAYERS[playerArea].color}30`,borderRadius:2,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {pc&&<div onClick={()=>clickable&&movePiece(pc.local)}
                    style={{width:CELL*0.6,height:CELL*0.6,borderRadius:'50%',background:LUDO_PLAYERS[playerArea].color,border:'1.5px solid rgba(255,255,255,0.8)',cursor:clickable?'pointer':'default',boxShadow:clickable?`0 0 7px 2px ${LUDO_PLAYERS[playerArea].color}`:'none',animation:clickable?'pulse 0.8s ease-in-out infinite':'none'}}/>}
                </div>;
              }
              return <div key={key}/>;
            })}
          </div>

          {/* Dice */}
          <div style={{textAlign:'center',marginTop:12}}>
            <div onClick={rollDice} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:52,height:52,background:rolling?'rgba(255,221,0,0.18)':'rgba(255,255,255,0.08)',border:`2px solid ${noMove?'#ff5050':turn===0&&!dice&&!rolling?'rgba(255,221,0,0.7)':'rgba(255,255,255,0.25)'}`,borderRadius:12,cursor:turn===0&&!rolling&&!dice&&over===null?'pointer':'default',fontSize:28,transition:'all 0.15s',boxShadow:turn===0&&!dice&&!rolling?'0 0 18px rgba(255,221,0,0.35)':'none'}}>
              {dice?['⚀','⚁','⚂','⚃','⚄','⚅'][dice-1]:'🎲'}
            </div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.45)',marginTop:5}}>
              {over!==null?'':turn===0?(dice?(myValidLocals.length?'Tap glowing piece':'Pass...'):(rolling?'Rolling...':'Click die to roll')):LUDO_PLAYERS[turn].name+' thinking...'}
            </div>
          </div>
          {over!==null&&<div style={{textAlign:'center',marginTop:10}}>
            <div style={{fontFamily:'var(--font-g)',color:'gold',marginBottom:8,fontSize:14}}>{over===0?'🏆 YOU WIN! 🏆':LUDO_PLAYERS[over].name+' wins!'}</div>
            <button className="btn btn-primary btn-sm" onClick={resetGame}>Play Again</button>
          </div>}
        </div>

        {/* Side panel */}
        <div style={{flex:1,minWidth:200}}>
          <div style={{background:'var(--surface)',borderRadius:'var(--r)',border:'1.5px solid var(--border)',padding:12,maxHeight:260,overflowY:'auto',marginBottom:12}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:8}}>📜 Log</div>
            {log.map((l,i)=><div key={i} style={{padding:'4px 0',borderBottom:'1px solid var(--border)',fontSize:11.5,color:'var(--text2)',opacity:Math.max(0.3,1-i*0.08)}}>{l}</div>)}
          </div>
          {LUDO_PLAYERS.map((pl,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 10px',background:turn===i&&over===null?'color-mix(in srgb,'+pl.color+' 12%, var(--surface))':'var(--surface)',borderRadius:10,marginBottom:5,border:`1.5px solid ${turn===i&&over===null?pl.color:'var(--border)'}`}}>
              <span style={{width:10,height:10,borderRadius:'50%',background:pl.color,display:'inline-block'}}/>
              <span style={{fontWeight:600,fontSize:12}}>{pl.name}</span>
              <span style={{marginLeft:'auto',fontSize:11,color:'var(--text3)'}}>{pieces.filter(pc=>pc.player===i&&pc.pos===48).length}/4 🏠</span>
            </div>
          ))}
          <div style={{marginTop:10,fontSize:11,color:'var(--text3)',padding:'8px 10px',background:'var(--surface2)',borderRadius:10,lineHeight:1.7}}>
            🎲 <strong>6</strong> = enter base or go again<br/>★ Start cells = safe from capture
          </div>
        </div>
      </div>
    </div>
  );
}

function MemoryDuel({onBack}) {
  const emojis=['🌿','⚡','🎯','🔑','📝','🌸','🎮','💡','🌍','🏆','⭐','🎨'];
  const makeCards=()=>{const c=[...emojis,...emojis].map((e,i)=>({id:i,emoji:e,flipped:false,matched:false,owner:null}));for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;};
  const [cards,setCards]=useState(makeCards);
  const [selected,setSelected]=useState([]);
  const [turn,setTurn]=useState('player');
  const [scores,setScores]=useState({player:0,ai:0});
  const [aiMsg,setAiMsg]=useState('Your turn! Find the matches 🎯');
  const [aiMem,setAiMem]=useState({});
  const [waiting,setWaiting]=useState(false);
  const [over,setOver]=useState(false);
  const [aiThink,setAiThink]=useState(false);

  const doAI=useCallback((curCards,mem)=>{
    setAiThink(true);
    setTimeout(()=>{
      const unmatched=curCards.filter(c=>!c.matched);
      const seen=Object.entries(mem);
      let p1=null,p2=null;
      for(const[idA,em]of seen){const match=seen.find(([idB,emB])=>emB===em&&idB!==idA);if(match){const a=curCards.find(c=>c.id===parseInt(idA));const b=curCards.find(c=>c.id===parseInt(match[0]));if(a&&!a.matched&&b&&!b.matched){p1=a;p2=b;break;}}}
      if(!p1){const cands=unmatched.filter(c=>!mem[c.id]).sort(()=>Math.random()-0.5);p1=cands[0]||unmatched[0];p2=cands[1]||unmatched.find(c=>c.id!==p1?.id);}
      if(!p1||!p2){setTurn('player');setAiThink(false);return;}
      setCards(prev=>prev.map(c=>c.id===p1.id?{...c,flipped:true}:c));
      setTimeout(()=>{
        setCards(prev=>prev.map(c=>c.id===p2.id?{...c,flipped:true}:c));
        setAiMem(m=>({...m,[p1.id]:p1.emoji,[p2.id]:p2.emoji}));
        setTimeout(()=>{
          if(p1.emoji===p2.emoji){
            setCards(prev=>{const nc=prev.map(c=>[p1.id,p2.id].includes(c.id)?{...c,matched:true,owner:'ai'}:c);if(nc.every(c=>c.matched))setOver(true);return nc;});
            setScores(s=>({...s,ai:s.ai+1}));setAiMsg(['Ha! Found it! 🤖','I never forget 😏','Match! 🔥','Too easy!'][Math.floor(Math.random()*4)]);
          } else {
            setCards(prev=>prev.map(c=>[p1.id,p2.id].includes(c.id)?{...c,flipped:false}:c));
            setAiMsg(['Hmm, not that time!','Your turn!','Almost...'][Math.floor(Math.random()*3)]);setTurn('player');
          }
          setAiThink(false);
        },900);
      },700);
    },800);
  },[]);

  const flip=id=>{
    if(turn!=='player'||waiting||over)return;
    const card=cards.find(c=>c.id===id);if(card.flipped||card.matched)return;
    const ns=[...selected,id];
    setCards(prev=>prev.map(c=>c.id===id?{...c,flipped:true}:c));
    setAiMem(m=>({...m,[id]:card.emoji}));
    setSelected(ns);
    if(ns.length===2){
      setWaiting(true);
      const[a,b]=ns.map(sid=>cards.find(c=>c.id===sid));
      if(a.emoji===b.emoji){
        setTimeout(()=>{setCards(prev=>{const nc=prev.map(c=>ns.includes(c.id)?{...c,matched:true,owner:'player'}:c);if(nc.every(c=>c.matched))setOver(true);return nc;});setScores(s=>({...s,player:s.player+1}));setSelected([]);setWaiting(false);},400);
      } else {
        setTimeout(()=>{setCards(prev=>prev.map(c=>ns.includes(c.id)?{...c,flipped:false}:c));setSelected([]);setWaiting(false);setTurn('ai');setAiMsg('My turn! 🤔');doAI(cards,aiMem);},800);
      }
    }
  };

  const winner = over?(scores.player>scores.ai?'🎉 You win!':scores.ai>scores.player?'🤖 Sprout wins!':'🤝 Draw!'):'';

  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:12}}>← Back</button>
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12,alignItems:'center'}}>
          <div style={{textAlign:'center'}}><div style={{fontSize:10,color:'var(--text3)'}}>You</div><div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:26,color:'var(--accent-d)'}}>{scores.player}</div></div>
          <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:18}}>🃏 Memory Duel</div>
          <div style={{textAlign:'center'}}><div style={{fontSize:10,color:'var(--text3)'}}>🤖 Sprout</div><div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:26,color:'var(--accent2-d)'}}>{scores.ai}</div></div>
        </div>
        <div style={{background:turn==='player'?'color-mix(in srgb,var(--accent) 10%,white)':'color-mix(in srgb,var(--accent2) 10%,white)',borderRadius:10,padding:'8px 14px',marginBottom:12,fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
          {aiThink&&<ThinkingDots/>} {aiMsg}
        </div>
        {over&&<div style={{background:'var(--surface2)',borderRadius:10,padding:'12px 16px',marginBottom:12,textAlign:'center',fontFamily:'var(--font-h)',fontWeight:800,fontSize:18}}>{winner}</div>}
        <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:7}}>
          {cards.map(c=>(
            <div key={c.id} onClick={()=>flip(c.id)} style={{height:58,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,cursor:c.matched?'default':'pointer',background:c.matched?(c.owner==='player'?'color-mix(in srgb,var(--accent) 18%,white)':'color-mix(in srgb,var(--accent2) 18%,white)'):c.flipped?'var(--surface2)':'var(--accent2)',border:`2px solid ${c.matched?(c.owner==='player'?'var(--accent)':'var(--accent2)'):c.flipped?'var(--border2)':'transparent'}`,opacity:c.matched?0.7:1,transition:'all 0.18s',boxShadow:turn==='player'&&!c.flipped&&!c.matched?'var(--shadow)':'none'}}>
              {(c.flipped||c.matched)?c.emoji:''}
            </div>
          ))}
        </div>
        {over&&<button className="btn btn-primary" style={{width:'100%',marginTop:14}} onClick={()=>{setCards(makeCards());setScores({player:0,ai:0});setTurn('player');setSelected([]);setWaiting(false);setOver(false);setAiMem({});setAiMsg('Your turn! Find the matches 🎯');}}>Play Again</button>}
      </div>
    </div>
  );
}

// ── TicTacToe vs AI (minimax) ─────────────────────────────────
function TicTacToe({onBack}) {
  const empty=()=>Array(9).fill(null);
  const [board,setBoard]=useState(empty());
  const [xIsNext,setXIsNext]=useState(true);
  const [scores,setScores]=useState({player:0,ai:0,draws:0});
  const [over,setOver]=useState(false);
  const [aiMsg,setAiMsg]=useState('');
  const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const calcWinner=b=>{for(const[a,c,d]of lines)if(b[a]&&b[a]===b[c]&&b[a]===b[d])return b[a];return null;};
  const minimax=(b,isMax)=>{const w=calcWinner(b);if(w==='O')return 10;if(w==='X')return-10;if(b.every(c=>c))return 0;const sc=[];b.forEach((cell,i)=>{if(!cell){const nb=[...b];nb[i]=isMax?'O':'X';sc.push(minimax(nb,!isMax));}});return isMax?Math.max(...sc):Math.min(...sc);};
  const bestMove=b=>{let best=-Infinity,move=-1;b.forEach((cell,i)=>{if(!cell){const nb=[...b];nb[i]='O';const s=minimax(nb,false);if(s>best){best=s;move=i;}}});return move;};
  useEffect(()=>{
    if(!xIsNext&&!over){
      setTimeout(()=>{
        const move=bestMove(board);if(move===-1)return;
        const nb=[...board];nb[move]='O';setBoard(nb);
        const w=calcWinner(nb),draw=!w&&nb.every(c=>c);
        if(w==='O'){setScores(s=>({...s,ai:s.ai+1}));setOver(true);setAiMsg(['I win! Calculated. 🤖','Ha! Minimax FTW!','Too easy! 😎'][Math.floor(Math.random()*3)]);}
        else if(draw){setScores(s=>({...s,draws:s.draws+1}));setOver(true);setAiMsg('Draw! Well played! 🤝');}
        else setXIsNext(true);
      },600);
    }
  },[xIsNext,board,over]);
  const click=i=>{
    if(!xIsNext||board[i]||over)return;
    const nb=[...board];nb[i]='X';setBoard(nb);
    const w=calcWinner(nb),draw=!w&&nb.every(c=>c);
    if(w==='X'){setScores(s=>({...s,player:s.player+1}));setOver(true);setAiMsg(["Wait...I lost?! Bug! 🤔","Beginner's luck!","Well played... I demand rematch!"][Math.floor(Math.random()*3)]);}
    else if(draw){setScores(s=>({...s,draws:s.draws+1}));setOver(true);setAiMsg('Draw! Even match! 🤝');}
    else setXIsNext(false);
  };
  const winner=calcWinner(board);
  const winLine=winner?lines.find(([a,c,d])=>board[a]&&board[a]===board[c]&&board[a]===board[d]):null;
  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:12}}>← Back</button>
      <div style={{maxWidth:340,margin:'0 auto',textAlign:'center'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
          <div><div style={{fontSize:10,color:'var(--text3)'}}>You (X)</div><div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:26,color:'var(--accent-d)'}}>{scores.player}</div></div>
          <div style={{alignSelf:'center',fontSize:12,color:'var(--text3)'}}>Draws: {scores.draws}</div>
          <div><div style={{fontSize:10,color:'var(--text3)'}}>🤖 AI (O)</div><div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:26,color:'var(--accent2-d)'}}>{scores.ai}</div></div>
        </div>
        <div style={{background:over?'var(--surface2)':xIsNext?'color-mix(in srgb,var(--accent) 10%,white)':'color-mix(in srgb,var(--accent2) 10%,white)',borderRadius:10,padding:'6px 14px',marginBottom:12,fontSize:13,fontWeight:600}}>
          {over?(winner?(winner==='X'?'🎉 You win!':'🤖 AI wins!'):'🤝 Draw!'):!xIsNext?<ThinkingDots/>:'Your turn (X)'}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
          {board.map((cell,i)=>{const isWin=winLine?.includes(i);return(
            <div key={i} onClick={()=>click(i)} style={{height:88,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-h)',fontWeight:900,fontSize:36,cursor:cell||over?'default':'pointer',background:isWin?(winner==='X'?'color-mix(in srgb,var(--accent) 18%,white)':'color-mix(in srgb,var(--accent2) 18%,white)'):'var(--surface)',border:`2px solid ${isWin?(winner==='X'?'var(--accent)':'var(--accent2)'):'var(--border)'}`,color:cell==='X'?'var(--accent-d)':'var(--accent2-d)',transition:'all 0.15s',boxShadow:'var(--shadow)'}}>
              {cell}
            </div>
          );})}
        </div>
        {aiMsg&&<div style={{background:'var(--surface2)',borderRadius:10,padding:'8px 14px',fontSize:13,color:'var(--text2)',marginBottom:10}}>🤖 {aiMsg}</div>}
        {over&&<button className="btn btn-primary" style={{width:'100%'}} onClick={()=>{setBoard(empty());setXIsNext(true);setOver(false);setAiMsg('');}}>Play Again</button>}
      </div>
    </div>
  );
}

// ── Reaction Race ─────────────────────────────────────────────
function ReactionRace({onBack}) {
  const [phase,setPhase]=useState('ready');
  const [scores,setScores]=useState({player:0,ai:0});
  const [startT,setStartT]=useState(null);
  const [playerMs,setPlayerMs]=useState(null);
  const [aiMs,setAiMs]=useState(null);
  const [msg,setMsg]=useState('');
  const timerRef=useRef(null);
  const startRound=()=>{setPhase('waiting');setPlayerMs(null);setAiMs(null);setMsg('');const d=1500+Math.random()*3000;timerRef.current=setTimeout(()=>{setStartT(Date.now());setPhase('go');const ad=180+Math.random()*240;setTimeout(()=>setAiMs(Math.round(ad)),ad);},d);};
  useEffect(()=>()=>clearTimeout(timerRef.current),[]);
  const handleClick=()=>{
    if(phase==='waiting'){clearTimeout(timerRef.current);setPhase('result');setAiMs(999);setPlayerMs(-1);setMsg('❌ Too early!');setScores(s=>({...s,ai:s.ai+1}));return;}
    if(phase==='go'&&!playerMs){const t=Date.now()-startT;setPlayerMs(t);}
  };
  useEffect(()=>{
    if(playerMs!==null&&aiMs!==null&&phase==='go'){
      setPhase('result');
      if(playerMs>0&&playerMs<aiMs){setScores(s=>({...s,player:s.player+1}));setMsg('⚡ You win! Faster than silicon!');}
      else{setScores(s=>({...s,ai:s.ai+1}));setMsg('🤖 Sprout wins! My reflexes are digital!');}
    }
  },[playerMs,aiMs,phase]);
  const bg={ready:'var(--surface2)',waiting:'#fef7e0',go:'#e8f7ef',result:'var(--surface2)'}[phase];
  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:12}}>← Back</button>
      <div style={{maxWidth:440,margin:'0 auto',textAlign:'center'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
          <div><div style={{fontSize:10,color:'var(--text3)'}}>You</div><div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:28,color:'var(--accent-d)'}}>{scores.player}</div></div>
          <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:18,alignSelf:'center'}}>⚡ Reaction Race</div>
          <div><div style={{fontSize:10,color:'var(--text3)'}}>🤖 Sprout</div><div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:28,color:'var(--accent2-d)'}}>{scores.ai}</div></div>
        </div>
        <div onClick={handleClick} style={{background:bg,borderRadius:'var(--r-lg)',padding:'60px 40px',cursor:['waiting','go'].includes(phase)?'pointer':'default',border:`3px solid ${phase==='go'?'var(--accent)':phase==='waiting'?'var(--w-gold)':'var(--border)'}`,transition:'all 0.15s',userSelect:'none',minHeight:180,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10}}>
          <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:22}}>{phase==='ready'?'⚡ Reaction Race':phase==='waiting'?'⏳ Wait for green...':phase==='go'?'🟢 CLICK NOW!':msg}</div>
          {phase==='result'&&playerMs>0&&<div style={{fontSize:13,color:'var(--text3)'}}>You: {playerMs}ms . Sprout: {aiMs}ms</div>}
          {phase==='go'&&<div style={{fontSize:42}}>👆</div>}
        </div>
        {(phase==='ready'||phase==='result')&&<button className="btn btn-primary" style={{marginTop:14,width:'100%'}} onClick={startRound}>{phase==='ready'?'Start':'Next Round'}</button>}
      </div>
    </div>
  );
}

// ── Breathing Timer ───────────────────────────────────────────
function BreathingTimer({onBack}) {
  const [phase,setPhase]=useState('ready');
  const [count,setCount]=useState(0);
  const [cycles,setCycles]=useState(0);
  const ref=useRef(null);
  const start=()=>{setPhase('inhale');setCount(4);};
  useEffect(()=>{
    if(phase==='ready')return;
    if(count>0){ref.current=setTimeout(()=>setCount(c=>c-1),1000);return()=>clearTimeout(ref.current);}
    if(phase==='inhale'){setPhase('hold');setCount(4);}
    else if(phase==='hold'){setPhase('exhale');setCount(6);}
    else if(phase==='exhale'){setCycles(c=>c+1);setPhase('inhale');setCount(4);}
  },[phase,count]);
  const cols={inhale:'var(--accent)',hold:'var(--accent2)',exhale:'var(--w-blush)',ready:'var(--surface2)'};
  const lbl={inhale:'Breathe In',hold:'Hold',exhale:'Breathe Out',ready:'Ready?'};
  const sz={inhale:160,hold:120,exhale:80,ready:100}[phase];
  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:16}}>← Back</button>
      <div className="card" style={{maxWidth:380,margin:'0 auto',textAlign:'center',padding:'40px 30px'}}>
        <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:20,marginBottom:4}}>🫁 Calm Breathing</div>
        <div style={{fontSize:13,color:'var(--text3)',marginBottom:24}}>4 in . 4 hold . 6 out . Cycles: {cycles}</div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:200}}>
          <div style={{width:sz,height:sz,borderRadius:'50%',background:cols[phase],display:'flex',alignItems:'center',justifyContent:'center',transition:'all 1.2s ease',flexDirection:'column',boxShadow:`0 0 40px ${cols[phase]}66`}}>
            <div style={{fontSize:26,fontWeight:900,fontFamily:'var(--font-h)',color:'white'}}>{phase!=='ready'?count:''}</div>
            <div style={{fontSize:13,fontWeight:700,color:'white'}}>{lbl[phase]}</div>
          </div>
        </div>
        {phase==='ready'?<button className="btn btn-primary" style={{marginTop:20}} onClick={start}>Start</button>
          :<button className="btn btn-ghost" style={{marginTop:20}} onClick={()=>{setPhase('ready');setCount(0);clearTimeout(ref.current);}}>Stop</button>}
      </div>
    </div>
  );
}

// ── Focus Timer ───────────────────────────────────────────────
function FocusTimer({onBack}) {
  const [dur,setDur]=useState(25);
  const [rem,setRem]=useState(25*60);
  const [run,setRun]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(run){ref.current=setInterval(()=>setRem(r=>{if(r<=1){clearInterval(ref.current);setRun(false);setDone(true);return 0;}return r-1;}),1000);return()=>clearInterval(ref.current);}
  },[run]);
  const reset=()=>{clearInterval(ref.current);setRun(false);setRem(dur*60);setDone(false);};
  const mins=Math.floor(rem/60),secs=rem%60,pct=((dur*60-rem)/(dur*60))*100;
  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:16}}>← Back</button>
      <div className="card" style={{maxWidth:340,margin:'0 auto',textAlign:'center',padding:'40px 30px'}}>
        <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:20,marginBottom:6}}>⏱️ Focus Timer</div>
        <div style={{fontSize:13,color:'var(--text3)',marginBottom:24}}>Stay in the zone. You've got this.</div>
        {!run&&rem===dur*60&&<div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:20}}>{[15,25,45].map(d=><button key={d} className={`btn btn-sm ${dur===d?'btn-primary':'btn-ghost'}`} onClick={()=>{setDur(d);setRem(d*60);}}>{d} min</button>)}</div>}
        <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:24}}>
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle cx="80" cy="80" r="70" fill="none" stroke="var(--border)" strokeWidth="10"/>
            <circle cx="80" cy="80" r="70" fill="none" stroke="var(--accent)" strokeWidth="10" strokeDasharray={`${2*Math.PI*70}`} strokeDashoffset={`${2*Math.PI*70*(1-pct/100)}`} strokeLinecap="round" transform="rotate(-90 80 80)" style={{transition:'stroke-dashoffset 1s linear'}}/>
          </svg>
          <div style={{position:'absolute',fontFamily:'var(--font-h)',fontWeight:900,fontSize:30,color:'var(--text)'}}>{String(mins).padStart(2,'0')}:{String(secs).padStart(2,'0')}</div>
        </div>
        {done&&<div style={{color:'var(--accent-d)',fontWeight:700,fontSize:15,marginBottom:14}}>🎉 Session complete! Great work.</div>}
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <button className="btn btn-primary" onClick={()=>setRun(r=>!r)}>{run?'⏸ Pause':rem<dur*60?'▶ Resume':'▶ Start'}</button>
          <button className="btn btn-ghost" onClick={reset}>↺ Reset</button>
        </div>
      </div>
    </div>
  );
}

// ── Space Defender -- original arcade shooter ──────────────────
function SpaceDefenderGame({onBack}) {
  const canvasRef = useRef(null);
  const stateRef  = useRef(null);
  const [score, setScore] = useState(0);
  const [lives, setLives] = useState(3);
  const [wave, setWave]   = useState(1);
  const [over, setOver]   = useState(false);
  const [paused, setPaused] = useState(false);

  const initState = () => ({
    ship:{x:180,y:430,w:28,h:24},
    bullets:[], enemyBullets:[], enemies:[], particles:[], stars:[],
    keys:{}, frame:0, fireTimer:0, spawnTimer:0, wave:1, score:0, lives:3,
  });

  const spawnWave = (S) => {
    const cols=6, rows=Math.min(2+Math.floor(S.wave/2),4);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      S.enemies.push({x:30+c*52,y:30+r*40,w:26,h:22,hp:1+Math.floor(S.wave/3),dir:1,
        kind:['👾','🛸','👽'][(r+c)%3], shootTimer:60+Math.random()*120});
    }
  };

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    canvas.width=360; canvas.height=480;
    const S = stateRef.current = initState();
    for(let i=0;i<60;i++) S.stars.push({x:Math.random()*360,y:Math.random()*480,s:Math.random()*2+0.5,v:0.5+Math.random()*1.5});
    spawnWave(S);

    const onKey=(e,down)=>{ S.keys[e.key]=down; if(down&&e.key===' ') e.preventDefault(); };
    const kd=e=>onKey(e,true), ku=e=>onKey(e,false);
    window.addEventListener('keydown',kd); window.addEventListener('keyup',ku);

    let raf;
    const loop=()=>{
      if(!stateRef.current.paused && !stateRef.current.over){
        update(S, canvas);
      }
      draw(ctx,S,canvas);
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('keydown',kd); window.removeEventListener('keyup',ku); };
  },[]);

  useEffect(()=>{ if(stateRef.current) stateRef.current.paused=paused; },[paused]);

  const update=(S, canvas)=>{
    S.frame++;
    // ship movement
    if(S.keys['ArrowLeft']||S.keys['a']) S.ship.x-=4.2;
    if(S.keys['ArrowRight']||S.keys['d']) S.ship.x+=4.2;
    S.ship.x=Math.max(10,Math.min(canvas.width-S.ship.w-10,S.ship.x));
    // firing
    S.fireTimer--;
    if((S.keys[' ']||S.keys['ArrowUp']) && S.fireTimer<=0){
      S.bullets.push({x:S.ship.x+S.ship.w/2-2,y:S.ship.y,vy:-7});
      S.fireTimer=10;
    }
    // bullets
    S.bullets=S.bullets.filter(b=>b.y>-10);
    S.bullets.forEach(b=>b.y+=b.vy);
    S.enemyBullets=S.enemyBullets.filter(b=>b.y<canvas.height+10);
    S.enemyBullets.forEach(b=>b.y+=b.vy);
    // enemies movement
    let edge=false;
    S.enemies.forEach(en=>{ en.x+=en.dir*(0.6+S.wave*0.12); if(en.x<5||en.x>canvas.width-en.w-5) edge=true; });
    if(edge) S.enemies.forEach(en=>{ en.dir*=-1; en.y+=14; });
    // enemy shooting
    S.enemies.forEach(en=>{
      en.shootTimer--;
      if(en.shootTimer<=0){ S.enemyBullets.push({x:en.x+en.w/2-2,y:en.y+en.h,vy:3+S.wave*0.3}); en.shootTimer=80+Math.random()*140; }
    });
    // collisions: bullets vs enemies
    S.bullets.forEach(b=>{
      S.enemies.forEach(en=>{
        if(b.y<en.y+en.h&&b.y+6>en.y&&b.x<en.x+en.w&&b.x+4>en.x&&!en._hit){
          en.hp--; b.y=-100;
          for(let i=0;i<6;i++) S.particles.push({x:en.x+en.w/2,y:en.y+en.h/2,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:20,color:'#ffdd00'});
          if(en.hp<=0){ en._dead=true; S.score+=10*S.wave; }
        }
      });
    });
    S.enemies=S.enemies.filter(en=>!en._dead);
    // enemy bullets vs ship
    S.enemyBullets.forEach(b=>{
      if(b.y>S.ship.y&&b.y<S.ship.y+S.ship.h&&b.x>S.ship.x-4&&b.x<S.ship.x+S.ship.w+4){
        b.y=10000; S.lives--; for(let i=0;i<10;i++) S.particles.push({x:S.ship.x+14,y:S.ship.y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:25,color:'#ff5050'});
      }
    });
    // enemies reach ship
    S.enemies.forEach(en=>{ if(en.y+en.h>S.ship.y) S.lives=0; });
    // particles
    S.particles=S.particles.filter(p=>p.life>0);
    S.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});
    // stars
    S.stars.forEach(st=>{ st.y+=st.v; if(st.y>480){st.y=0; st.x=Math.random()*360;} });
    // wave clear
    if(S.enemies.length===0){ S.wave++; setWave(S.wave); spawnWave(S); }
    if(S.lives<=0){ S.over=true; setOver(true); }
    setScore(S.score); setLives(S.lives);
  };

  const draw=(ctx,S,canvas)=>{
    ctx.fillStyle='#060818'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#ffffff';
    S.stars.forEach(st=>{ ctx.globalAlpha=0.4+st.s*0.2; ctx.fillRect(st.x,st.y,st.s,st.s); });
    ctx.globalAlpha=1;
    // ship
    ctx.save(); ctx.translate(S.ship.x+S.ship.w/2,S.ship.y+S.ship.h/2);
    ctx.fillStyle='#00d4ff'; ctx.shadowColor='#00d4ff'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(14,12); ctx.lineTo(-14,12); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
    // bullets
    ctx.fillStyle='#39ff14'; ctx.shadowColor='#39ff14'; ctx.shadowBlur=6;
    S.bullets.forEach(b=>ctx.fillRect(b.x,b.y,4,10));
    ctx.fillStyle='#ff3d9a'; ctx.shadowColor='#ff3d9a';
    S.enemyBullets.forEach(b=>ctx.fillRect(b.x,b.y,4,8));
    ctx.shadowBlur=0;
    // enemies
    ctx.font='22px serif'; ctx.textAlign='center';
    S.enemies.forEach(en=>ctx.fillText(en.kind,en.x+en.w/2,en.y+en.h));
    // particles
    S.particles.forEach(p=>{ ctx.globalAlpha=p.life/25; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,3,3); });
    ctx.globalAlpha=1;
  };

  const restart=()=>{
    const S=stateRef.current; Object.assign(S,initState());
    for(let i=0;i<60;i++) S.stars.push({x:Math.random()*360,y:Math.random()*480,s:Math.random()*2+0.5,v:0.5+Math.random()*1.5});
    spawnWave(S); setOver(false); setScore(0); setLives(3); setWave(1);
  };

  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:16}}>← Back to Games</button>
      <div style={{display:'flex',gap:20,flexWrap:'wrap',justifyContent:'center'}}>
        <div style={{position:'relative'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontFamily:'var(--font-g)',fontSize:13,color:'#39ff14'}}>
            <span>SCORE: {score}</span><span>WAVE {wave}</span><span>{'❤️'.repeat(Math.max(0,lives))}</span>
          </div>
          <canvas ref={canvasRef} style={{border:'2px solid rgba(0,212,255,0.4)',borderRadius:10,boxShadow:'0 0 30px rgba(0,212,255,0.25)',touchAction:'none'}}
            onMouseDown={()=>stateRef.current.keys[' ']=true}
            onMouseUp={()=>stateRef.current.keys[' ']=false}
            onTouchStart={e=>{stateRef.current.keys[' ']=true;}}
            onTouchEnd={()=>stateRef.current.keys[' ']=false}/>
          {over&&(
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.75)',borderRadius:10}}>
              <div style={{fontSize:22,fontFamily:'var(--font-g)',color:'#ff3d9a',marginBottom:8}}>GAME OVER</div>
              <div style={{color:'white',marginBottom:14}}>Final Score: {score}</div>
              <button className="btn btn-primary btn-sm" onClick={restart}>Play Again</button>
            </div>
          )}
        </div>
        {/* Touch controls */}
        <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>Controls</div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.8}}>⬅️➡️ Move<br/>␣ / ⬆️ Fire</div>
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <button className="btn btn-secondary btn-sm" onTouchStart={()=>stateRef.current.keys['ArrowLeft']=true} onTouchEnd={()=>stateRef.current.keys['ArrowLeft']=false} onMouseDown={()=>stateRef.current.keys['ArrowLeft']=true} onMouseUp={()=>stateRef.current.keys['ArrowLeft']=false}>◀</button>
            <button className="btn btn-secondary btn-sm" onTouchStart={()=>stateRef.current.keys[' ']=true} onTouchEnd={()=>stateRef.current.keys[' ']=false} onMouseDown={()=>stateRef.current.keys[' ']=true} onMouseUp={()=>stateRef.current.keys[' ']=false}>🔥</button>
            <button className="btn btn-secondary btn-sm" onTouchStart={()=>stateRef.current.keys['ArrowRight']=true} onTouchEnd={()=>stateRef.current.keys['ArrowRight']=false} onMouseDown={()=>stateRef.current.keys['ArrowRight']=true} onMouseUp={()=>stateRef.current.keys['ArrowRight']=false}>▶</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Snake Run -- classic snake, original implementation ─────────
function SnakeGame({onBack}) {
  const canvasRef=useRef(null);
  const GRID=18, CELLS=20;
  const stateRef=useRef(null);
  const [score,setScore]=useState(0);
  const [over,setOver]=useState(false);
  const [paused,setPaused]=useState(false);

  const initState=()=>({
    snake:[{x:10,y:10},{x:9,y:10},{x:8,y:10}],
    dir:{x:1,y:0}, nextDir:{x:1,y:0},
    food:{x:14,y:10}, score:0, speed:9, tick:0, over:false,
  });
  const randFood=(S)=>{
    let f; do{ f={x:Math.floor(Math.random()*CELLS),y:Math.floor(Math.random()*CELLS)}; }
    while(S.snake.some(s=>s.x===f.x&&s.y===f.y));
    return f;
  };

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    canvas.width=GRID*CELLS; canvas.height=GRID*CELLS;
    const S=stateRef.current=initState();

    const keyMap={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
    const onKey=e=>{
      const d=keyMap[e.key]; if(!d) return;
      const cur=S.dir;
      if(d.x===-cur.x&&d.y===-cur.y) return; // no reverse
      S.nextDir=d; e.preventDefault();
    };
    window.addEventListener('keydown',onKey);

    let raf,last=0;
    const loop=(t)=>{
      if(!S.paused&&!S.over){
        if(t-last>1000/S.speed){ last=t; step(S,canvas); }
      }
      draw(ctx,S,canvas);
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('keydown',onKey); };
  },[]);

  useEffect(()=>{ if(stateRef.current) stateRef.current.paused=paused; },[paused]);

  const step=(S,canvas)=>{
    S.dir=S.nextDir;
    const head={x:S.snake[0].x+S.dir.x,y:S.snake[0].y+S.dir.y};
    if(head.x<0||head.x>=CELLS||head.y<0||head.y>=CELLS||S.snake.some(s=>s.x===head.x&&s.y===head.y)){
      S.over=true; setOver(true); return;
    }
    S.snake.unshift(head);
    if(head.x===S.food.x&&head.y===S.food.y){
      S.score+=10; setScore(S.score); S.food=randFood(S);
      S.speed=Math.min(18,9+Math.floor(S.score/50));
    } else S.snake.pop();
  };

  const draw=(ctx,S,canvas)=>{
    ctx.fillStyle='#0a1428'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(255,255,255,0.04)';
    for(let i=0;i<=CELLS;i++){ ctx.beginPath();ctx.moveTo(i*GRID,0);ctx.lineTo(i*GRID,canvas.height);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*GRID);ctx.lineTo(canvas.width,i*GRID);ctx.stroke(); }
    // food
    ctx.fillStyle='#ff3d9a'; ctx.shadowColor='#ff3d9a'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(S.food.x*GRID+GRID/2,S.food.y*GRID+GRID/2,GRID/2-2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    // snake
    S.snake.forEach((s,i)=>{
      ctx.fillStyle=i===0?'#39ff14':`hsl(${100+i*4},80%,${Math.max(30,55-i)}%)`;
      ctx.shadowColor='#39ff14'; ctx.shadowBlur=i===0?8:0;
      ctx.fillRect(s.x*GRID+1,s.y*GRID+1,GRID-2,GRID-2);
      ctx.shadowBlur=0;
    });
  };

  const restart=()=>{ stateRef.current=initState(); setOver(false); setScore(0); };

  const dirBtn=(dir)=>()=>{
    const S=stateRef.current; const cur=S.dir;
    if(dir.x===-cur.x&&dir.y===-cur.y) return;
    S.nextDir=dir;
  };

  return (
    <div>
      <button className="btn btn-ghost btn-sm" onClick={onBack} style={{marginBottom:16}}>← Back to Games</button>
      <div style={{display:'flex',gap:20,flexWrap:'wrap',justifyContent:'center'}}>
        <div style={{position:'relative'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontFamily:'var(--font-g)',fontSize:13,color:'#39ff14'}}>
            <span>SCORE: {score}</span><span>SPEED {stateRef.current?.speed||9}</span>
          </div>
          <canvas ref={canvasRef} style={{border:'2px solid rgba(57,255,20,0.35)',borderRadius:10,boxShadow:'0 0 30px rgba(57,255,20,0.2)'}}/>
          {over&&(
            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.75)',borderRadius:10}}>
              <div style={{fontSize:22,fontFamily:'var(--font-g)',color:'#ff3d9a',marginBottom:8}}>GAME OVER</div>
              <div style={{color:'white',marginBottom:14}}>Final Score: {score}</div>
              <button className="btn btn-primary btn-sm" onClick={restart}>Play Again</button>
            </div>
          )}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10,alignItems:'center'}}>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:4}}>Controls</div>
          <div style={{fontSize:12,color:'var(--text2)'}}>Arrow keys or WASD</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,44px)',gap:6,marginTop:8}}>
            <div/><button className="btn btn-secondary btn-sm" onClick={dirBtn({x:0,y:-1})}>▲</button><div/>
            <button className="btn btn-secondary btn-sm" onClick={dirBtn({x:-1,y:0})}>◀</button>
            <div/>
            <button className="btn btn-secondary btn-sm" onClick={dirBtn({x:1,y:0})}>▶</button>
            <div/><button className="btn btn-secondary btn-sm" onClick={dirBtn({x:0,y:1})}>▼</button><div/>
          </div>
        </div>
      </div>
    </div>
  );
}

function SettingsPage({data, update, viewMode, setViewMode}) {
  const [tab, setTab] = useState('ai');
  const [selAI, setSelAI] = useState(data.aiSettings?.provider || 'groq');
  const [aiForm, setAiForm] = useState({
    provider: data.aiSettings?.provider || 'groq',
    model:    data.aiSettings?.model    || 'llama-3.1-8b-instant',
    apiKey:   data.aiSettings?.apiKey   || '',
    endpoint: data.aiSettings?.endpoint || '',
  });
  const [testResult, setTestResult] = useState('');
  const [testing, setTesting]       = useState(false);
  const [saved, setSaved]           = useState(false);

  const af = k => e => setAiForm(p => ({...p, [k]: e.target.value}));

  const selProvider = AI_PROVIDERS.find(p => p.id === selAI) || AI_PROVIDERS[0];

  const applyProvider = (p) => {
    setSelAI(p.id);
    setAiForm(prev => ({
      ...prev,
      provider: p.id,
      model:    p.model    || prev.model,
      endpoint: p.endpoint || '',
    }));
  };

  const saveAI = () => {
    update('aiSettings', {...(data.aiSettings||{}), ...aiForm});
    // also persist to localStorage for callAI fallback
    localStorage.setItem('ai_provider', aiForm.provider);
    localStorage.setItem('ai_key',      aiForm.apiKey);
    localStorage.setItem('ai_model',    aiForm.model);
    localStorage.setItem('ai_endpoint', aiForm.endpoint);
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const testAI = async () => {
    setTesting(true); setTestResult('');
    try {
      const reply = await callAI({
        system: 'Reply with exactly: "OpsGarden AI connected and working!"',
        messages: [{role:'user', content:'Test.'}],
        aiCfg: aiForm,

// ── Browser Mode ──────────────────────────────────────────────
function BrowserMode({data, update}) {
  const tabs      = data.browserTabs || SEED.browserTabs;
  const activeId  = data.activeBrowserTab || tabs[0]?.id;
  const activeTab = tabs.find(t => t.id === activeId) || tabs[0];
  const [urlInput, setUrlInput] = useState(activeTab?.url || '');
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [showNotes, setShowNotes] = useState(false);
  const [showBookmarksBar, setShowBookmarksBar] = useState(true);
  const [loading, setLoading] = useState(false);
  const [blocked, setBlocked] = useState(false);
  const [reloadKey, setReloadKey] = useState(0);
  const inputRef = useRef(null);
  const loadTimerRef = useRef(null);

  const bookmarks = data.browserBookmarks || [];
  const history   = data.browserHistory   || [];
  const notesMap  = data.browserNotes     || {};

  // Sync url bar when active tab changes
  useEffect(()=>{ setUrlInput(activeTab?.url || ''); setBlocked(false); setShowSuggestions(false); }, [activeId]);

  const SHORTCUTS = [
    {name:'Lovable',    url:'https://lovable.dev',     icon:'🎨'},
    {name:'Make.com',   url:'https://make.com',        icon:'⚡'},
    {name:'n8n',        url:'https://n8n.io',          icon:'🔧'},
    {name:'ChatGPT',    url:'https://chat.openai.com', icon:'💬'},
    {name:'Groq',       url:'https://groq.com',        icon:'⚡'},
    {name:'Airtable',   url:'https://airtable.com',    icon:'📊'},
    {name:'Google',     url:'https://google.com',      icon:'🔍'},
    {name:'GitHub',     url:'https://github.com',      icon:'🐙'},
    {name:'YouTube',    url:'https://youtube.com',     icon:'▶️'},
    {name:'Notion',     url:'https://notion.so',       icon:'📝'},
    {name:'Zapier',     url:'https://zapier.com',      icon:'⚡'},
    {name:'Figma',      url:'https://figma.com',       icon:'🎨'},
    {name:'DuckDuckGo', url:'https://duckduckgo.com',  icon:'🦆'},
    {name:'Wikipedia',  url:'https://wikipedia.org',   icon:'📚'},
    {name:'Anthropic',  url:'https://anthropic.com',   icon:'✦'},
    {name:'GHL',        url:'https://app.gohighlevel.com', icon:'🏢'},
  ];

  // Domains known to block iframe embedding (X-Frame-Options / CSP frame-ancestors)
  const BLOCKED_DOMAINS = [
    'youtube.com','google.com','github.com','facebook.com','instagram.com',
    'twitter.com','x.com','linkedin.com','n8n.io','notion.so','figma.com',
    'chat.openai.com','app.gohighlevel.com','airtable.com','reddit.com',
    'whatsapp.com','tiktok.com','amazon.com','netflix.com','spotify.com',
    'discord.com','slack.com','zoom.us','microsoft.com','apple.com',
  ];

  const isBlocked = (url) => {
    try {
      const host = new URL(url).hostname.replace(/^www\./,'');
      return BLOCKED_DOMAINS.some(d => host===d || host.endsWith('.'+d));
    } catch { return false; }
  };

  const getFavicon = (url) => {
    try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=32`; }
    catch { return null; }
  };

  const setActiveTab = id => update('activeBrowserTab', id);

  const addTab = () => {
    const nt = {id:'bt'+Date.now(), title:'New Tab', url:'', favicon:'✨', pinned:false, isNew:true};
    update('browserTabs', [...tabs, nt]);
    update('activeBrowserTab', nt.id);
  };

  const closeTab = (id, e) => {
    e.stopPropagation();
    const remaining = tabs.filter(t => t.id !== id);
    const finalTabs = remaining.length ? remaining : [{id:'bt'+Date.now(), title:'New Tab', url:'', favicon:'✨', pinned:false, isNew:true}];
    update('browserTabs', finalTabs);
    if(id === activeId) update('activeBrowserTab', finalTabs[0].id);
  };

  const navigate = (raw) => {
    let nav = (raw||'').trim();
    if(!nav) return;
    setShowSuggestions(false);
    // Detect if it's a URL vs a search query
    const looksLikeUrl = /^https?:\/\//i.test(nav) || /^[\w-]+(\.[\w-]+)+([\/?#].*)?$/i.test(nav);
    if(!looksLikeUrl){
      nav = 'https://duckduckgo.com/?q=' + encodeURIComponent(nav);
    } else if(!/^https?:\/\//i.test(nav)){
      nav = 'https://' + nav;
    }
    let title = nav;
    try { title = new URL(nav).hostname.replace(/^www\./,''); } catch {}
    const blockedNow = isBlocked(nav);
    update('browserTabs', tabs.map(t => t.id === activeId ? {...t, url:nav, title, favicon:getFavicon(nav)||'🌐', isNew:false} : t));
    update('browserHistory', [{url:nav, title, ts:Date.now()}, ...history.filter(h=>h.url!==nav)].slice(0,60));
    setUrlInput(nav);
    setBlocked(blockedNow);
    if(!blockedNow){
      setLoading(true);
      setReloadKey(k=>k+1);
      clearTimeout(loadTimerRef.current);
      loadTimerRef.current = setTimeout(()=>{ setLoading(false); setBlocked(true); }, 6000);
    }
  };

  const reload = () => { if(activeTab?.url) navigate(activeTab.url); };

  const toggleBookmark = (url, title, favicon) => {
    const exists = bookmarks.find(b=>b.url===url);
    if(exists) update('browserBookmarks', bookmarks.filter(b=>b.url!==url));
    else update('browserBookmarks', [...bookmarks, {url, title: title||url, favicon: favicon||getFavicon(url)}]);
  };
  const isBookmarked = activeTab?.url && bookmarks.some(b=>b.url===activeTab.url);

  const noteKey = activeTab?.url || 'general';
  const updateNote = (text) => update('browserNotes', {...notesMap, [noteKey]: text});

  // Build suggestions while typing
  const query = urlInput.toLowerCase();
  const suggestions = query ? [
    ...bookmarks.filter(b=>b.title.toLowerCase().includes(query)||b.url.toLowerCase().includes(query)).slice(0,4).map(b=>({...b, type:'Bookmark'})),
    ...history.filter(h=>h.title.toLowerCase().includes(query)||h.url.toLowerCase().includes(query)).slice(0,4).map(h=>({...h, type:'History'})),
    ...SHORTCUTS.filter(s=>s.name.toLowerCase().includes(query)).slice(0,4).map(s=>({...s, type:'Site', favicon:s.icon})),
  ].slice(0,8) : [];

  const onFrameLoad = () => { setLoading(false); clearTimeout(loadTimerRef.current); };
  const onFrameError = () => { setLoading(false); setBlocked(true); clearTimeout(loadTimerRef.current); };

  return (
    <div className="browser-wrapper" style={{height:'100%',display:'flex',flexDirection:'column',position:'relative'}}>
      {/* Tab bar */}
      <div className="browser-chrome-bar">
        {tabs.map(t => (
          <div key={t.id} className={`browser-tab-item ${t.id === activeId ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
            {t.favicon && t.favicon.startsWith('http')
              ? <img src={t.favicon} alt="" style={{width:14,height:14,flexShrink:0,borderRadius:3}} onError={e=>{e.target.style.display='none';}}/>
              : <span style={{flexShrink:0,fontSize:14}}>{t.favicon||'🌐'}</span>}
            <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,fontSize:12}}>{t.title}</span>
            {!t.pinned && <span className="tab-close" onClick={e => closeTab(t.id, e)}>✕</span>}
          </div>
        ))}
        <div className="new-tab-btn" onClick={addTab} title="New Tab">+</div>
      </div>

      {/* URL bar */}
      <div className="browser-url-bar" style={{position:'relative'}}>
        <button className="url-nav-btn" onClick={reload} title="Reload">↻</button>
        <button className="url-nav-btn" onClick={()=>setShowBookmarksBar(s=>!s)} title="Toggle bookmarks bar" style={{color:showBookmarksBar?'var(--b-mauve)':'var(--b-text3)'}}>★</button>
        <input ref={inputRef} className="url-input" value={urlInput}
          onChange={e => {setUrlInput(e.target.value); setShowSuggestions(true);}}
          onFocus={()=>setShowSuggestions(true)}
          onBlur={()=>setTimeout(()=>setShowSuggestions(false),150)}
          onKeyDown={e => e.key === 'Enter' && navigate(urlInput)}
          placeholder="Search DuckDuckGo or type a URL..."/>
        <button className="url-nav-btn" onClick={() => navigate(urlInput)} title="Go">→</button>
        <button className="url-nav-btn" onClick={()=>activeTab?.url && toggleBookmark(activeTab.url, activeTab.title, activeTab.favicon)} title={isBookmarked?'Remove bookmark':'Add bookmark'} style={{color:isBookmarked?'#ffd700':'var(--b-text3)'}}>{isBookmarked?'★':'☆'}</button>
        <button className="url-nav-btn" onClick={()=>setShowNotes(s=>!s)} title="Notes" style={{color:showNotes?'var(--b-mauve)':'var(--b-text3)'}}>📝</button>
        {activeTab?.url && <a href={activeTab.url} target="_blank" rel="noreferrer" className="url-nav-btn" title="Open in new browser tab" style={{textDecoration:'none',display:'flex',alignItems:'center',justifyContent:'center'}}>↗</a>}

        {/* Suggestions dropdown */}
        {showSuggestions && suggestions.length>0 && (
          <div className="url-suggestions">
            {suggestions.map((s,i)=>(
              <div key={i} className="url-suggestion-item" onMouseDown={()=>navigate(s.url)}>
                {s.favicon && s.favicon.startsWith('http')
                  ? <img src={s.favicon} alt="" style={{width:14,height:14,borderRadius:3}} onError={e=>e.target.style.display='none'}/>
                  : <span>{s.favicon||'🌐'}</span>}
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.title}</span>
                <span className="sugg-type">{s.type}</span>
              </div>
            ))}
            <div className="url-suggestion-item" onMouseDown={()=>navigate(urlInput)}>
              <span>🔍</span><span>Search DuckDuckGo for "{urlInput}"</span>
            </div>
          </div>
        )}
      </div>

      {/* Bookmarks bar */}
      {showBookmarksBar && (
        <div className="bookmarks-bar">
          {bookmarks.length===0 && <span style={{fontSize:11,color:'var(--b-text3)',padding:'2px 8px'}}>★ Star a page to bookmark it here</span>}
          {bookmarks.map((b,i)=>(
            <div key={i} className="bookmark-chip" onClick={()=>navigate(b.url)}>
              {b.favicon && b.favicon.startsWith('http')
                ? <img src={b.favicon} alt="" style={{width:13,height:13,borderRadius:3}} onError={e=>e.target.style.display='none'}/>
                : <span>{b.favicon||'🌐'}</span>}
              <span>{b.title}</span>
              <span className="bm-remove" onClick={e=>{e.stopPropagation();update('browserBookmarks',bookmarks.filter((x,xi)=>xi!==i));}}>✕</span>
            </div>
          ))}
        </div>
      )}

      {/* Content area */}
      <div style={{flex:1,position:'relative',display:'flex',minHeight:0}}>
        {activeTab?.isNew || !activeTab?.url ? (
          <div style={{flex:1,overflowY:'auto',background:'var(--b-bg)',padding:30}}>
            <div style={{textAlign:'center',marginBottom:24}}>
              <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:22,color:'var(--b-text)',marginBottom:6}}>✨ New Tab</div>
              <div style={{fontSize:13,color:'var(--b-text3)'}}>Search or enter a URL above, or pick a shortcut</div>
            </div>
            <div className="new-tab-grid" style={{maxWidth:760,margin:'0 auto'}}>
              {SHORTCUTS.map(s => (
                <div key={s.name} className="new-tab-shortcut" onClick={() => navigate(s.url)}>
                  <span className="site-icon">{s.icon}</span>
                  <span className="site-name">{s.name}</span>
                </div>
              ))}
            </div>
            {history.length>0 && (
              <div style={{maxWidth:760,margin:'28px auto 0'}}>
                <div style={{fontSize:11,fontWeight:700,color:'var(--b-text3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:10}}>🕘 Recent History</div>
                <div style={{display:'flex',flexDirection:'column',gap:4}}>
                  {history.slice(0,8).map((h,i)=>(
                    <div key={i} onClick={()=>navigate(h.url)} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 12px',background:'var(--b-surface)',borderRadius:8,cursor:'pointer',fontSize:12,color:'var(--b-text2)',border:'1px solid var(--b-border)'}}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--b-surface2)'} onMouseLeave={e=>e.currentTarget.style.background='var(--b-surface)'}>
                      <span style={{flexShrink:0}}>🌐</span>
                      <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.title}</span>
                      <span style={{fontSize:10,color:'var(--b-text3)',flexShrink:0}}>{new Date(h.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        ) : blocked ? (
          <div className="iframe-blocked">
            <div style={{fontSize:48}}>🔒</div>
            <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:18,color:'var(--b-text)'}}>This site can't be embedded</div>
            <div style={{fontSize:13,color:'var(--b-text3)',maxWidth:380,lineHeight:1.7}}>
              <strong>{activeTab.title}</strong> blocks embedding in other apps for security (X-Frame-Options / CSP).
              This is set by the website itself -- open it in a full browser tab instead.
            </div>
            <a href={activeTab.url} target="_blank" rel="noreferrer" className="btn btn-primary" style={{textDecoration:'none'}}>↗ Open {activeTab.title} in New Tab</a>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setBlocked(false);setLoading(true);setReloadKey(k=>k+1);clearTimeout(loadTimerRef.current);loadTimerRef.current=setTimeout(()=>{setLoading(false);setBlocked(true);},6000);}}>Try embedding anyway</button>
          </div>
        ) : (
          <>
            {loading && (
              <div className="iframe-loading">
                <div className="spinner"/>
              </div>
            )}
            <iframe key={reloadKey} src={activeTab?.url} className="browser-frame" title={activeTab?.title}
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
              referrerPolicy="no-referrer"
              onLoad={onFrameLoad} onError={onFrameError}/>
          </>
        )}

        {/* Notes panel */}
        {showNotes && (
          <div className="browser-notes-panel">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',borderBottom:'1px solid var(--b-border)'}}>
              <div style={{fontWeight:700,fontSize:13,color:'var(--b-text)'}}>📝 Page Notes</div>
              <button onClick={()=>setShowNotes(false)} style={{background:'none',border:'none',color:'var(--b-text3)',fontSize:16,cursor:'pointer'}}>✕</button>
            </div>
            <div style={{padding:'8px 14px',fontSize:11,color:'var(--b-text3)',borderBottom:'1px solid var(--b-border)'}}>
              Notes for: <strong style={{color:'var(--b-text2)'}}>{activeTab?.title||'this tab'}</strong>
            </div>
            <textarea value={notesMap[noteKey]||''} onChange={e=>updateNote(e.target.value)} placeholder="Write notes about this page... saved automatically."/>
          </div>
        )}
      </div>
    </div>
  );
}

// AUTH SCREEN -- Firebase login (optional, can skip to local mode)
// ═══════════════════════════════════════════════════════════════
function AuthScreen({onEnter}) {
  const [showFbSetup, setShowFbSetup] = useState(false);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [isSignup, setIsSignup] = useState(false);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [fbConfigText, setFbConfigText] = useState('');
  const fbConfig = getFirebaseConfig();

  const handleAuth = async (e) => {
    e.preventDefault();
    setError(''); setLoading(true);
    const fb = initFirebase(fbConfig);
    if(!fb.ok){ setError('Firebase not configured. Click "Set up Firebase" below, or continue locally.'); setLoading(false); return; }
    try {
      if(isSignup) await fb.auth.createUserWithEmailAndPassword(email,password);
      else await fb.auth.signInWithEmailAndPassword(email,password);
      onEnter(fb.auth.currentUser);
    } catch(err){ setError(err.message); }
    setLoading(false);
  };

  const handleGoogle = async () => {
    const fb = initFirebase(fbConfig);
    if(!fb.ok){ setError('Firebase not configured yet.'); return; }
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result = await fb.auth.signInWithPopup(provider);
      onEnter(result.user);
    } catch(err){ setError(err.message); }
  };

  const saveFbConfig = () => {
    try {
      const cleaned = fbConfigText.replace(/^\s*(const|let|var)\s+\w+\s*=\s*/,'').replace(/;\s*$/,'');
      const cfg = JSON.parse(cleaned.replace(/(\w+):/g,'"$1":').replace(/'/g,'"'));
      localStorage.setItem(FIREBASE_CONFIG_KEY, JSON.stringify(cfg));
      setShowFbSetup(false);
      window.location.reload();
    } catch { setError('Could not parse Firebase config. Paste the exact firebaseConfig object from your Firebase console.'); }
  };

  if(showFbSetup) {
    return (
      <div className="auth-screen">
        <div className="firebase-setup">
          <div style={{fontFamily:'Nunito,sans-serif',fontWeight:900,fontSize:22,color:'white',marginBottom:8}}>🔥 Connect Firebase</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.6)',marginBottom:16,lineHeight:1.7}}>
            1. Go to <a href="https://console.firebase.google.com" target="_blank" rel="noreferrer" style={{color:'#6ba362'}}>console.firebase.google.com</a> → Create Project<br/>
            2. Add a Web App (click the {'</>'} icon)<br/>
            3. Copy the <code style={{color:'#a8d8a8'}}>firebaseConfig</code> object<br/>
            4. Paste it below<br/>
            5. Enable <strong>Authentication</strong> (Email/Password + Google), <strong>Firestore</strong>, and <strong>Storage</strong> in the Firebase console
          </div>
          <textarea className="auth-input" style={{minHeight:140,fontFamily:'monospace',fontSize:11.5}} placeholder={`{\n  apiKey: "...",\n  authDomain: "...",\n  projectId: "...",\n  storageBucket: "...",\n  messagingSenderId: "...",\n  appId: "..."\n}`} value={fbConfigText} onChange={e=>setFbConfigText(e.target.value)}/>
          {error && <div className="auth-error">{error}</div>}
          <button className="auth-btn" onClick={saveFbConfig}>💾 Save & Connect Firebase</button>
          <div style={{textAlign:'center',marginTop:14}}>
            <span className="auth-link" onClick={()=>setShowFbSetup(false)}>← Back</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="auth-screen">
      <div className="auth-card">
        <div className="auth-logo">🌿</div>
        <div className="auth-title">OpsGarden</div>
        <div className="auth-sub">{fbConfig ? (isSignup?'Create your account':'Welcome back') : 'Premium Personal Operations Platform'}</div>

        {fbConfig ? (
          <form onSubmit={handleAuth}>
            <input className="auth-input" type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required/>
            <input className="auth-input" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} required/>
            {error && <div className="auth-error">{error}</div>}
            <button className="auth-btn" type="submit" disabled={loading}>{loading?'Please wait...':(isSignup?'Create Account':'Sign In')}</button>
            <div className="auth-divider"><span>or</span></div>
            <button type="button" className="auth-google-btn" onClick={handleGoogle}>
              <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Continue with Google
            </button>
            <div style={{textAlign:'center',marginTop:18,fontSize:12.5,color:'rgba(255,255,255,0.5)'}}>
              {isSignup?'Already have an account? ':"Don't have an account? "}
              <span className="auth-link" onClick={()=>setIsSignup(!isSignup)}>{isSignup?'Sign In':'Sign Up'}</span>
            </div>
          </form>
        ) : (
          <div style={{fontSize:13,color:'rgba(255,255,255,0.55)',lineHeight:1.8,textAlign:'center',marginBottom:10}}>
            Connect Firebase for multi-user online access, or continue locally -- all data stays in your browser.
          </div>
        )}

        <div className="auth-divider"><span>{fbConfig?'Firebase connected ✅':'Local mode'}</span></div>
        <button className="auth-btn" style={{background:fbConfig?'rgba(255,255,255,0.08)':'linear-gradient(135deg,#6ba362,#9b8ec4)',boxShadow:fbConfig?'none':undefined}} onClick={()=>onEnter(null)}>
          {fbConfig ? '👤 Continue without account (local)' : '🚀 Continue Locally (No Login)'}
        </button>
        <div style={{textAlign:'center',marginTop:14}}>
          <span className="auth-link" onClick={()=>setShowFbSetup(true)}>{fbConfig?'⚙️ Reconfigure Firebase':'🔥 Set up Firebase (for online multi-user)'}</span>
        </div>
      </div>
    </div>
  );
}
