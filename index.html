// MAIN APP
// ═══════════════════════════════════════════════════════════════
const NAV_ITEMS = {
  work: [
    {section:'Overview', items:[
      {id:'dashboard', icon:'🌳', label:'Garden'},
    ]},
    {section:'CRM', items:[
      {id:'clients',   icon:'👥', label:'Clients'},
      {id:'decisions', icon:'⚖️', label:'Decisions'},
    ]},
    {section:'Project Management', items:[
      {id:'tasks',     icon:'✅', label:'Tasks'},
      {id:'notes',     icon:'📝', label:'Notes'},
      {id:'docs',      icon:'📄', label:'Docs'},
    ]},
    {section:'Automations', items:[
      {id:'automations', icon:'⚡', label:'Automations'},
    ]},
  ],
  game: [
    {section:'Game Zone', items:[
      {id:'games', icon:'🎮', label:'All Games'},
    ]},
  ],
  browser: [
    {section:'Browser', items:[
      {id:'browser', icon:'🌐', label:'Tabs'},
    ]},
  ],
};
const SHARED_NAV = [
  {section:'System', items:[
    {id:'settings', icon:'⚙️', label:'Settings'},
  ]},
];

function App() {
  const [data, setData]       = useState(loadLocal());
  const [mode, setMode]        = useState('work');
  const [page, setPage]        = useState('dashboard');
  const [viewMode, setViewMode]= useState('medium');
  const [aiOpen, setAiOpen]    = useState(false);
  const [authed, setAuthed]    = useState(() => localStorage.getItem('opsgarden_skip_auth')==='1');
  const [transition, setTransition] = useState(null); // {from,to}
  const [pendingMode, setPendingMode] = useState(null);
  const [showNotif, setShowNotif] = useState(false);
  const [selectedWf, setSelectedWf] = useState(null);
  const [tod, setTod] = useState('day');

  // Persist data
  useEffect(() => { saveLocal(data); }, [data]);

  // Update helper
  const update = useCallback((key, value) => {
    setData(prev => ({...prev, [key]: typeof value==='function'?value(prev[key]):value}));
  }, []);

  // Time of day detection
  useEffect(() => {
    const env = data.envSettings || SEED.envSettings;
    if(env.timeTracking !== false && !env.tod) {
      const updateTod = () => {
        const h = new Date().getHours();
        setTod(h>=6&&h<17?'day':h>=17&&h<20?'evening':'night');
      };
      updateTod();
      const interval = setInterval(updateTod, 60000);
      return () => clearInterval(interval);
    } else if(env.tod && env.tod!=='auto') {
      setTod(env.tod);
    }
  }, [data.envSettings]);

  // Mode switching with transition
  const switchMode = (newMode) => {
    if(newMode === mode || transition) return;
    setTransition({from: mode, to: newMode});
    setPendingMode(newMode);
  };
  const onTransitionDone = () => {
    setMode(pendingMode);
    setTransition(null);
    // Set default page for new mode
    if(pendingMode==='work') setPage('dashboard');
    else if(pendingMode==='game') setPage('games');
    else if(pendingMode==='browser') setPage('browser');
    setSelectedWf(null);
  };

  const env = data.envSettings || SEED.envSettings;
  const season = mode==='work' ? (env.season==='auto' ? 'spring' : env.season) : 'spring';

  // Set data-mode attribute on html element
  useEffect(() => {
    document.documentElement.setAttribute('data-mode', mode);
    document.documentElement.setAttribute('data-season', season);
    document.documentElement.setAttribute('data-tod', tod);
  }, [mode, season, tod]);

  if(!authed) return <AuthScreen onEnter={(user)=>{ localStorage.setItem('opsgarden_skip_auth','1'); if(user) update('currentUser',{email:user.email,uid:user.uid}); setAuthed(true); }}/>;

  const navSections = [...(NAV_ITEMS[mode]||[]), ...SHARED_NAV];

  const pageTitle = {
    dashboard:'🌳 Garden Dashboard', clients:'👥 Clients', automations:'⚡ Automations',
    tasks:'✅ Tasks', notes:'📝 Notes', docs:'📄 Documents', decisions:'⚖️ Decisions',
    games:'🎮 Game Zone', browser:'🌐 Browser', settings:'⚙️ Settings', workflowDetail:'⚡ Workflow Detail',
  }[page] || 'OpsGarden';

  const renderPage = () => {
    if(selectedWf) return <WorkflowDetailPage workflow={selectedWf} data={data} update={update} onBack={()=>setSelectedWf(null)}/>;
    switch(page) {
      case 'dashboard': return <GardenDashboard data={data} openWorkflow={wf=>setSelectedWf(wf)} setPage={setPage} mode={mode} season={season} tod={tod}/>;
      case 'clients':   return <ClientsPage data={data} update={update}/>;
      case 'automations': return <WorkflowsPage data={data} update={update} openWorkflow={wf=>setSelectedWf(wf)}/>;
      case 'tasks':     return <TasksPage data={data} update={update}/>;
      case 'notes':     return <NotesPage data={data} update={update}/>;
      case 'docs':      return <DocsPage data={data} update={update}/>;
      case 'decisions': return <DecisionsPage data={data} update={update}/>;
      case 'games':     return <GamesPage/>;
      case 'browser':   return <BrowserMode data={data} update={update}/>;
      case 'settings':  return <SettingsPage data={data} update={update} viewMode={viewMode} setViewMode={setViewMode}/>;
      default: return <GardenDashboard data={data} openWorkflow={wf=>setSelectedWf(wf)} setPage={setPage} mode={mode} season={season} tod={tod}/>;
    }
  };

  const isBrowserFullscreen = page==='browser' && mode==='browser';
  const density = env.animationDensity || 'medium';

  return (
    <AppCtx.Provider value={{data, update, mode}}>
      <div className="app-shell">
        {/* Mode transition overlay */}
        {transition && <ModeTransition from={transition.from} to={transition.to} onDone={onTransitionDone}/>}

        {/* Mode bar */}
        {/* ── MODEBAR ── */}
        <div className="modebar">
          <div className="modebar-brand">
            <div className="brand-gem">
              {mode==='game' ? '⚔' : mode==='browser' ? '🌐' : '◈'}
            </div>
            <div>
              <div className="brand-name">
                {mode==='game' ? 'OPSZONE' : mode==='browser' ? 'OpsGarden' : 'OpsGarden'}
              </div>
              {mode==='work' && <div style={{fontSize:9,color:'var(--w-gray2)',letterSpacing:'1.5px',textTransform:'uppercase',marginTop:1}}>Operations Platform</div>}
            </div>
          </div>

          {/* mode pills */}
          <div className="mode-toggle-group">
            <button className={`mode-btn ${mode==='work'?'active':''}`} onClick={()=>switchMode('work')}>
              <span>◈</span> Work
            </button>
            <button className={`mode-btn ${mode==='game'?'active':''}`} onClick={()=>switchMode('game')}>
              <span>⚔</span> {mode==='game'?'ZONE':'Game'}
            </button>
            <button className={`mode-btn ${mode==='browser'?'active':''}`} onClick={()=>switchMode('browser')}>
              <span>◎</span> Browser
            </button>
          </div>

          {/* Work mode: inline stat pills */}
          {mode==='work' && (
            <div style={{display:'flex',gap:6,marginLeft:16}}>
              {[
                {label:'Active', val:(data.workflows||[]).filter(w=>w.status==='In Progress').length, color:'#e85d04'},
                {label:'Tasks',  val:(data.tasks||[]).filter(t=>t.status!=='Complete').length, color:'#0f0f0e'},
                {label:'Clients',val:(data.clients||[]).length, color:'#6b6b68'},
              ].map(s=>(
                <div key={s.label} style={{display:'flex',alignItems:'center',gap:5,padding:'4px 10px',background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:6,fontSize:11,fontWeight:700,color:'var(--text2)'}}>
                  <span style={{color:s.color,fontSize:14,fontWeight:800}}>{s.val}</span>
                  <span style={{color:'var(--text3)',fontWeight:500,fontSize:10}}>{s.label}</span>
                </div>
              ))}
            </div>
          )}

          {/* Game mode: XP bar */}
          {mode==='game' && (
            <div style={{display:'flex',alignItems:'center',gap:10,marginLeft:16,flex:1,maxWidth:260}}>
              <span style={{fontSize:10,fontFamily:'Orbitron',color:'var(--g-gold)',letterSpacing:1}}>LVL {Math.floor(((data.tasks||[]).filter(t=>t.status==='Complete').length)/3)+1}</span>
              <div style={{flex:1,height:4,background:'rgba(255,255,255,0.08)',borderRadius:4,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${(((data.tasks||[]).filter(t=>t.status==='Complete').length)%3)/3*100}%`,background:'linear-gradient(90deg,var(--g-crimson),var(--g-purple))',boxShadow:'0 0 8px var(--g-crimson)'}}/>
              </div>
              <span style={{fontSize:9,color:'var(--g-text3)',fontFamily:'Orbitron'}}>XP</span>
            </div>
          )}

          <div className="modebar-right">
            {/* Search */}
            <div className="search-box" style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
              <span style={{opacity:0.5}}>⌕</span>
              <span>Search...</span>
              <span style={{marginLeft:'auto',fontSize:10,opacity:0.4,padding:'1px 5px',border:'1px solid var(--border2)',borderRadius:4}}>⌘K</span>
            </div>
            <div style={{position:'relative'}}>
              <div className="icon-btn" onClick={()=>setShowNotif(s=>!s)} title="Notifications">
                🔔
                {((data.tasks||[]).filter(t=>t.priority==='High'&&t.status!=='Complete').length>0) && <span className="notif-dot"/>}
              </div>
              {showNotif && <NotificationPanel data={data} onClose={()=>setShowNotif(false)}/>}
            </div>
            <div className="icon-btn" onClick={()=>setAiOpen(o=>!o)} title="AI Assistant" style={{position:'relative'}}>
              {mode==='game'?'🤖':'✦'}
              {mode==='game' && <span style={{position:'absolute',inset:0,borderRadius:8,boxShadow:'0 0 10px rgba(224,24,90,0.4)',pointerEvents:'none'}}/>}
            </div>
            <div className="user-avatar" title={data.currentUser?.email||'Local'}>
              {mode==='game'
                ? <span style={{fontSize:16}}>👤</span>
                : (data.currentUser?.email||'A')[0].toUpperCase()
              }
            </div>
          </div>
        </div>

        {/* ── MIDDLE ROW ── */}
        <div className="middle-row">
          {!isBrowserFullscreen && (
            <div className="sidebar">
              {/* Game mode: player card at top */}
              {mode==='game' && (
                <div style={{padding:'14px 14px 10px',borderBottom:'1px solid var(--g-border2)'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <div style={{width:38,height:38,borderRadius:'50%',background:'linear-gradient(135deg,var(--g-crimson-d),var(--g-purple-d))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,boxShadow:'0 0 14px rgba(224,24,90,0.3)'}}>👤</div>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--g-text)',fontFamily:'Exo 2',letterSpacing:0.5}}>{(data.currentUser?.name||'Player One').toUpperCase()}</div>
                      <div style={{fontSize:9,color:'var(--g-crimson)',fontFamily:'Orbitron',letterSpacing:1}}>RANK: OPERATOR</div>
                    </div>
                  </div>
                  <div style={{fontSize:9,color:'var(--g-text3)',fontFamily:'Orbitron',letterSpacing:1,marginBottom:4}}>PROGRESS</div>
                  <div style={{height:3,background:'rgba(255,255,255,0.06)',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:'62%',background:'linear-gradient(90deg,var(--g-crimson),var(--g-purple))',boxShadow:'0 0 6px var(--g-crimson)'}}/>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:6,fontSize:9,color:'var(--g-text3)',fontFamily:'Orbitron'}}>
                    <span>MISSIONS: {(data.tasks||[]).filter(t=>t.status==='Complete').length}</span>
                    <span style={{color:'var(--g-gold)'}}>⭐ {(data.tasks||[]).filter(t=>t.status==='Complete').length*10} XP</span>
                  </div>
                </div>
              )}

              <div className="sidebar-nav">
                {navSections.map(sec => (
                  <div key={sec.section}>
                    <div className="nav-section-label">{sec.section}</div>
                    {sec.items.map(item => (
                      <div key={item.id}
                        className={`nav-item ${page===item.id && !selectedWf ? 'active':''}`}
                        onClick={()=>{setPage(item.id);setSelectedWf(null);}}>
                        <span className="nav-icon">{item.icon}</span>
                        <span>{item.label}</span>
                        {item.id==='tasks' && (data.tasks||[]).filter(t=>t.priority==='High'&&t.status!=='Complete').length>0 &&
                          <span className="nav-badge">{(data.tasks||[]).filter(t=>t.priority==='High'&&t.status!=='Complete').length}</span>}
                        {item.id==='decisions' && (data.decisions||[]).filter(d=>!d.decided).length>0 &&
                          <span className="nav-badge">{(data.decisions||[]).filter(d=>!d.decided).length}</span>}
                      </div>
                    ))}
                  </div>
                ))}
              </div>

              <div className="sidebar-footer">
                <span className="status-dot"/>
                {mode==='work' ? 'Work Mode' : mode==='game' ? 'Game Zone' : 'Browser Mode'}
                <div style={{marginTop:3,opacity:0.6,fontSize:10}}>{season} . {tod}</div>
              </div>
            </div>
          )}

          {/* ── MAIN AREA ── */}
          <div className="main-area">
            {mode!=='browser' && page!=='dashboard' && (
              <div className="env-layer">
                <EnvCanvas mode={mode} season={season} tod={tod} density={density}/>
                <AICharacter charKey={env.aiCharacter||'sprout'} mode={mode} onChat={()=>setAiOpen(true)}/>
              </div>
            )}

            {!isBrowserFullscreen && (
              <div className="topbar">
                <div className="topbar-title">
                  {selectedWf ? `⚡ ${selectedWf.name}` : pageTitle}
                </div>
                {/* Work: breadcrumb tag */}
                {mode==='work' && !selectedWf && (
                  <div style={{display:'flex',alignItems:'center',gap:6,marginLeft:4}}>
                    <span style={{fontSize:11,color:'var(--text3)',padding:'2px 8px',background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:5,fontWeight:600}}>
                      {new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
                    </span>
                  </div>
                )}
                {/* Game: mission counter */}
                {mode==='game' && (
                  <div style={{marginLeft:12,fontSize:10,fontFamily:'Orbitron',color:'var(--g-text3)',letterSpacing:1}}>
                    MISSIONS: {(data.tasks||[]).filter(t=>t.status!=='Complete').length} ACTIVE
                  </div>
                )}
                <div style={{marginLeft:'auto'}}/>
                <div className="search-box" style={{minWidth:160,display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{opacity:0.4}}>⌕</span>
                  <span style={{fontSize:12,opacity:0.6}}>Search...</span>
                </div>
              </div>
            )}

            <div className="page-scroll" style={{padding: isBrowserFullscreen?0:undefined}}>
              <div className={isBrowserFullscreen ? '' : 'page-pad'} style={{height: isBrowserFullscreen?'100%':undefined}}>
                <div className="main-content-inner" style={{height: isBrowserFullscreen?'100%':undefined}}>
                  {renderPage()}
                </div>
              </div>
            </div>
          </div>

          {/* AI Panel -- proper flex sibling inside middle-row */}
          <AIPanel open={aiOpen} onClose={()=>setAiOpen(false)} data={data} update={update} mode={mode}/>
        </div>
      </div>
    </AppCtx.Provider>
  );
}

// ═══════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════
try {
    const root2 = ReactDOM.createRoot(document.getElementById('root'));
    root2.render(React.createElement(ErrorBoundary,null,React.createElement(App,null)));
    if(window.__hideLoader) window.__hideLoader();
  } catch(mountErr) {
    console.error('OpsGarden mount error:', mountErr);
    var errDiv = document.createElement('div');
    errDiv.style.cssText = 'position:fixed;inset:0;background:#fff8f8;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;font-family:sans-serif;text-align:center;z-index:99999;';
    errDiv.innerHTML = '<div style="font-size:36px;margin-bottom:16px">⚠️</div><h2 style="color:#c00;margin-bottom:12px">OpsGarden Startup Error</h2><pre style="background:#f5f5f5;padding:16px;border-radius:8px;max-width:600px;text-align:left;font-size:12px;overflow:auto;color:#333;">' + mountErr.message + '</pre><p style="color:#666;margin-top:12px;font-size:13px">Press F12 → Console for full details</p><button onclick="location.reload()" style="margin-top:16px;padding:12px 28px;background:#e85d04;color:white;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:700;">Retry</button>';
    document.getElementById('app-loader').style.display='none';
    document.body.appendChild(errDiv);
  }
</script>
</body>
</html>
