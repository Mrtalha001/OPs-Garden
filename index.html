// NOTIFICATION PANEL
// ═══════════════════════════════════════════════════════════════
function NotificationPanel({onClose, data}) {
  const urgent = (data.tasks||[]).filter(t=>t.priority==='High'&&t.status!=='Complete');
  const waiting = (data.tasks||[]).filter(t=>t.status==='Waiting');
  const pending = (data.decisions||[]).filter(d=>!d.decided);
  const pinned  = (data.notes||[]).filter(n=>n.pinned);
  return (
    <div className="notif-panel" style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <span style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:15}}>🔔 Notifications</span>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'var(--text3)'}}>✕</button>
      </div>
      {urgent.length>0&&(<div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:6}}>🔥 Urgent Tasks</div>
        {urgent.map(t=><div key={t.id} style={{padding:'7px 10px',background:'rgba(255,80,80,0.08)',borderRadius:8,marginBottom:5,borderLeft:'3px solid #e07a7a'}}>
          <div style={{fontWeight:600,fontSize:12.5}}>{t.name}</div>
          {t.blocker&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>⛔ {t.blocker}</div>}
        </div>)}
      </div>)}
      {waiting.length>0&&(<div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:6}}>⏳ Waiting On</div>
        {waiting.map(t=><div key={t.id} style={{padding:'7px 10px',background:'rgba(228,184,106,0.1)',borderRadius:8,marginBottom:5,borderLeft:'3px solid var(--w-gold)'}}>
          <div style={{fontWeight:600,fontSize:12.5}}>{t.name}</div>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{t.owner}</div>
        </div>)}
      </div>)}
      {pending.length>0&&(<div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:6}}>⚖️ Pending Decisions</div>
        {pending.map(d=><div key={d.id} style={{padding:'7px 10px',background:'rgba(155,142,196,0.1)',borderRadius:8,marginBottom:5,borderLeft:'3px solid var(--w-lavender)'}}>
          <div style={{fontWeight:600,fontSize:12.5}}>{d.title}</div>
        </div>)}
      </div>)}
      {pinned.length>0&&(<div>
        <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:6}}>📌 Pinned Notes</div>
        {pinned.map(n=><div key={n.id} style={{padding:'7px 10px',background:'var(--surface2)',borderRadius:8,marginBottom:5,fontSize:12,color:'var(--text2)'}}>
          {n.text.slice(0,80)}{n.text.length>80&&'...'}
        </div>)}
      </div>)}
      {urgent.length===0&&waiting.length===0&&pending.length===0&&pinned.length===0&&(
        <div style={{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:13}}>✅ All clear! No alerts.</div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// AI PANEL -- Streaming, multi-chat, file upload
// ═══════════════════════════════════════════════════════════════
function AIPanel({open, onClose, data, update, mode}) {
  const aiCfg = data.aiSettings||{};
  const allChats = aiCfg.chats || data.aiChats || [];
  const activeChatId = aiCfg.activeChat || (allChats[0]?.id);
  const activeChat = allChats.find(c=>c.id===activeChatId) || allChats[0];
  const messages = activeChat?.messages || [];

  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [streamText, setStreamText] = useState('');
  const [aiMode, setAiMode] = useState('work');
  const [showSetup, setShowSetup] = useState(false);
  const [searching, setSearching] = useState(false);
  const [showChats, setShowChats] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  const msgIdRef = useRef(100);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,streamText]);
  useEffect(()=>{ if(open) setTimeout(()=>inputRef.current?.focus(),200); },[open]);

  const hasAI = !!(aiCfg.apiKey || (aiCfg.provider==='ollama'));
  const provider = aiCfg.provider || 'groq';

  const buildContext = () => `WORKSPACE (${new Date().toLocaleDateString()}):
CLIENTS: ${(data.clients||[]).map(c=>`${c.name}/${c.company} Phase:${c.phase} Next:${c.nextAction||'-'}`).join(' | ')}
WORKFLOWS: ${(data.workflows||[]).map(w=>`[${w.status}]${w.name}(${w.progress}%) Next:${w.nextAction} Waiting:${w.waitingOn||'-'}`).join(' | ')}
OPEN TASKS: ${(data.tasks||[]).filter(t=>t.status!=='Complete').map(t=>`[${t.priority}]${t.name} Blocker:${t.blocker||'-'}`).join(' | ')}
PINNED NOTES: ${(data.notes||[]).filter(n=>n.pinned).map(n=>n.text.slice(0,80)).join(' | ')}
PENDING DECISIONS: ${(data.decisions||[]).filter(d=>!d.decided).map(d=>d.title).join(', ')||'None'}`;

  const systemPrompt = aiMode==='work'
    ? `You are Sprout, a warm, smart, professional personal operations assistant in OpsGarden. You have full workspace data below. Be concise, use **bold** and bullet points. Refer to real data. Help the user stay organized and productive.\n\n${buildContext()}`
    : `You are Sprout, a playful witty AI game companion. Be fun, brief, entertaining, and supportive. 1-2 sentences max unless asked for more.`;

  const saveMessages = (chatId, newMsgs) => {
    const updatedChats = (data.aiChats||[]).map(c=>c.id===chatId?{...c,messages:newMsgs,updatedAt:Date.now()}:c);
    update('aiChats', updatedChats);
  };

  const newChat = () => {
    const nc = {id:'chat'+Date.now(),title:'New Chat',messages:[{role:'assistant',content:"Fresh start! 🌿 What would you like to talk about?",ts:Date.now(),id:msgIdRef.current++}],createdAt:Date.now(),updatedAt:Date.now()};
    update('aiChats',[...(data.aiChats||[]),nc]);
    update('aiSettings',{...(data.aiSettings||{}),activeChat:nc.id});
    setShowChats(false);
  };

  const selectChat = (id) => { update('aiSettings',{...(data.aiSettings||{}),activeChat:id}); setShowChats(false); };

  const send = async (overrideMsg) => {
    const text = (overrideMsg || input).trim();
    if(!text || loading) return;
    setInput('');
    const userMsg = {role:'user', content:text, ts:Date.now(), id:msgIdRef.current++};
    const newMsgs = [...messages, userMsg];
    saveMessages(activeChatId, newMsgs);
    setLoading(true); setStreamText('');

    let searchCtx = '';
    if(needsSearch(text)){
      setSearching(true);
      const sr = await webSearch(text);
      setSearching(false);
      if(sr) searchCtx = `\n\n[WEB SEARCH for "${text}"]:\n${sr}\nUse this and mention you searched the web.`;
    }

    const histMsgs = messages.slice(-12).map(m=>({role:m.role,content:m.content}));
    histMsgs.push({role:'user',content:text+searchCtx});

    if(!hasAI){
      await new Promise(r=>setTimeout(r,400));
      const reply = localFallback(text, data);
      saveMessages(activeChatId,[...newMsgs,{role:'assistant',content:reply,ts:Date.now(),id:msgIdRef.current++}]);
      setLoading(false); return;
    }

    try {
      let full='';
      await callAI({system:systemPrompt,messages:histMsgs,mode:aiMode,aiCfg,
        onChunk:(p)=>{setStreamText(p);full=p;}
      });
      saveMessages(activeChatId,[...newMsgs,{role:'assistant',content:full||'...',ts:Date.now(),id:msgIdRef.current++}]);
    } catch(err) {
      let em = `⚠️ ${err.message}`;
      if(err.message.includes('NO_GROQ_KEY')) em=`⚠️ **Groq key missing!**\n\nGo to ⚙️ Settings → AI tab → paste your free key from **console.groq.com**`;
      else if(err.message.includes('Ollama')) em=`⚠️ **Ollama not running.**\nOpen terminal and run:\n\`ollama serve\``;
      saveMessages(activeChatId,[...newMsgs,{role:'assistant',content:em,ts:Date.now(),id:msgIdRef.current++,isError:true}]);
    }
    setStreamText(''); setLoading(false);
  };

  const quickWork=[
    {i:'🎯',l:"Today's priorities",m:"What are my top priorities today based on urgency and status?"},
    {i:'🔴',l:"What's blocked?",m:"List everything that is currently blocked or waiting on someone."},
    {i:'👤',l:"Summarize Aaron",m:"Full status summary for Aaron LeSage -- all workflows, progress, blockers, next actions."},
    {i:'📧',l:"Draft client update",m:"Write a short professional status update email to Aaron for this week."},
    {i:'⚖️',l:"Pending decisions",m:"What decisions are still unresolved? List them with options and why they matter."},
    {i:'📊',l:"Full overview",m:"Give me a complete workspace overview -- clients, workflows, tasks, decisions, blockers."},
  ];
  const quickGame=[
    {i:'🎮',l:"What should I play?",m:"Which game should I play right now to refresh my mind?"},
    {i:'🃏',l:"Trash talk me",m:"Trash talk me before our memory duel! Be playful."},
    {i:'🌍',l:"Build suggestion",m:"Give me a creative idea of what to build in GardenWorld right now."},
    {i:'⚡',l:"Hype me up",m:"Hype me up like I'm about to win a championship!"},
  ];
  const quickActions = aiMode==='work' ? quickWork : quickGame;

  const providerLabels = {groq:'⚡ Groq',ollama:'🦙 Ollama',openrouter:'🌩️ OpenRouter',anthropic:'🧠 Claude',openai:'💬 OpenAI'};

  return (
    <div className={`ai-panel${open?'':' closed'}`}>
      {/* Header */}
      <div className="ai-header">
        <div className="ai-avatar-orb">{aiMode==='game'?'🎮':'🌿'}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>Sprout {aiMode==='game'?'. Game':'. Work'}</div>
          <div onClick={()=>setShowSetup(s=>!s)} style={{fontSize:10.5,color:hasAI?'var(--w-moss)':'var(--coral)',cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:hasAI?'#22c55e':'#ef4444',display:'inline-block'}}/>
            {hasAI?providerLabels[provider]||provider:'Not connected -- click to setup'}
          </div>
        </div>
        <div style={{display:'flex',gap:4}}>
          <button onClick={()=>setShowChats(s=>!s)} title="Chats" style={{background:'none',border:'none',cursor:'pointer',fontSize:15,color:'var(--text3)',padding:'3px 5px',borderRadius:6}} title="View chats">💬</button>
          <button onClick={()=>saveMessages(activeChatId,[{role:'assistant',content:"Fresh start! 🌿 What would you like to talk about?",ts:Date.now(),id:msgIdRef.current++}])} title="Clear" style={{background:'none',border:'none',cursor:'pointer',fontSize:14,color:'var(--text3)',padding:'3px 5px',borderRadius:6}}>🗑</button>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:19,color:'var(--text3)',padding:'3px 6px',borderRadius:6}}>✕</button>
        </div>
      </div>

      {/* Quick setup banner */}
      {showSetup&&(
        <div style={{background:'var(--surface2)',borderBottom:'1px solid var(--border)',padding:'12px 15px',flexShrink:0,fontSize:12}}>
          <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>🔌 Connect AI</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {[
              {k:'groq',label:'⚡ Groq',badge:'FREE',desc:'Llama 3.1 70B . smartest free . get key at console.groq.com',needsKey:true,link:'https://console.groq.com'},
              {k:'ollama',label:'🦙 Ollama',badge:'FREE LOCAL',desc:'Private & offline . install from ollama.com . run: ollama serve',needsKey:false,link:'https://ollama.com'},
              {k:'openrouter',label:'🌩️ OpenRouter',badge:'FREE TIER',desc:'Free Llama/Mistral via API . key at openrouter.ai',needsKey:true,link:'https://openrouter.ai'},
            ].map(ai=>(
              <div key={ai.k} style={{background:'var(--surface)',borderRadius:10,padding:'9px 12px',border:`1.5px solid ${(aiCfg.provider||'groq')===ai.k?'var(--accent)':'var(--border)'}`}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontWeight:700}}>{ai.label}</span>
                  <span style={{background:'#e8f7ef',color:'#1a7a4a',borderRadius:20,padding:'1px 7px',fontSize:9.5,fontWeight:800}}>{ai.badge}</span>
                </div>
                <div style={{color:'var(--text3)',fontSize:11,marginBottom:7}}>{ai.desc}</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  <a href={ai.link} target="_blank" rel="noreferrer" style={{padding:'3px 10px',background:'var(--accent)',color:'white',borderRadius:20,textDecoration:'none',fontSize:11,fontWeight:700}}>Get Key/Install</a>
                  <button onClick={()=>{ update('aiSettings',{...aiCfg,provider:ai.k,model:ai.k==='groq'?'llama-3.1-8b-instant':ai.k==='ollama'?'llama3':'meta-llama/llama-3.1-8b-instruct:free'}); }} style={{padding:'3px 10px',background:(aiCfg.provider||'groq')===ai.k?'var(--accent2)':'var(--surface2)',color:(aiCfg.provider||'groq')===ai.k?'white':'var(--text2)',borderRadius:20,border:'none',fontSize:11,fontWeight:700,cursor:'pointer'}}>
                    {(aiCfg.provider||'groq')===ai.k?'✓ Selected':'Select'}
                  </button>
                </div>
              </div>
            ))}
            {(aiCfg.provider==='groq'||aiCfg.provider==='openrouter'||aiCfg.provider==='anthropic'||aiCfg.provider==='openai')&&(
              <div style={{background:'var(--surface)',borderRadius:10,padding:'9px 12px',border:'1.5px solid var(--border)'}}>
                <div style={{fontWeight:600,marginBottom:6,fontSize:12}}>Paste your {aiCfg.provider} API key:</div>
                <div style={{display:'flex',gap:6}}>
                  <input type="password" defaultValue={aiCfg.apiKey||''} id="ai-key-quick" placeholder="sk-..." style={{flex:1,padding:'6px 10px',border:'1.5px solid var(--border2)',borderRadius:8,fontSize:12,fontFamily:'var(--font)',background:'var(--bg)',color:'var(--text)'}}/>
                  <button onClick={()=>{const k=document.getElementById('ai-key-quick')?.value?.trim();if(k){update('aiSettings',{...aiCfg,apiKey:k});setShowSetup(false);}}} style={{padding:'6px 12px',background:'var(--accent)',color:'white',border:'none',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer'}}>Save</button>
                </div>
              </div>
            )}
            <button onClick={()=>setShowSetup(false)} style={{background:'none',border:'none',color:'var(--text3)',fontSize:11,cursor:'pointer',padding:'4px'}}>Close ▲</button>
          </div>
        </div>
      )}

      {/* Chat list */}
      {showChats&&(
        <div style={{background:'var(--surface2)',borderBottom:'1px solid var(--border)',padding:'10px 14px',maxHeight:200,overflowY:'auto',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontWeight:700,fontSize:12}}>💬 Chat Sessions</span>
            <button onClick={newChat} style={{padding:'3px 10px',background:'var(--accent)',color:'white',border:'none',borderRadius:20,fontSize:11,fontWeight:700,cursor:'pointer'}}>+ New</button>
          </div>
          {(data.aiChats||[]).map(c=>(
            <div key={c.id} onClick={()=>selectChat(c.id)} style={{padding:'6px 10px',borderRadius:8,cursor:'pointer',background:c.id===activeChatId?'color-mix(in srgb,var(--accent) 12%,white)':'transparent',fontWeight:c.id===activeChatId?700:400,fontSize:12,color:'var(--text2)',marginBottom:4,border:'1px solid '+(c.id===activeChatId?'var(--border2)':'transparent')}}>
              {c.title} <span style={{fontSize:10,opacity:0.5,marginLeft:6}}>{c.messages?.length||0} msgs</span>
            </div>
          ))}
        </div>
      )}

      {/* Mode toggle */}
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',background:'var(--surface2)',flexShrink:0}}>
        {[['work','💼 Work'],['game','🎮 Game']].map(([m,lbl])=>(
          <button key={m} onClick={()=>setAiMode(m)} style={{flex:1,padding:'8px 0',border:'none',borderBottom:aiMode===m?'2px solid var(--accent)':'2px solid transparent',background:'transparent',fontFamily:'var(--font)',fontSize:12,fontWeight:700,color:aiMode===m?'var(--accent-d)':'var(--text3)',cursor:'pointer',transition:'all 0.15s'}}>{lbl}</button>
        ))}
      </div>

      {/* Messages */}
      <div className="ai-messages">
        {messages.map((m,i)=>(
          <div key={m.id||i} className={`ai-msg ${m.role}`} style={{background:m.isError?'rgba(255,80,80,0.1)':m.role==='user'?'color-mix(in srgb,var(--accent) 14%,var(--surface))':'color-mix(in srgb,var(--accent2) 8%,var(--surface))',borderLeft:m.isError?'3px solid #e07a7a':'none',fontSize:13,lineHeight:1.65}}>
            <MdText text={m.content}/>
          </div>
        ))}
        {loading&&streamText&&(
          <div className="ai-msg assistant" style={{background:'color-mix(in srgb,var(--accent2) 8%,var(--surface))',fontSize:13,lineHeight:1.65}}>
            <MdText text={streamText}/>
            <span style={{display:'inline-block',width:8,height:14,background:'var(--accent)',borderRadius:2,marginLeft:3,animation:'blink 0.8s infinite'}}/>
          </div>
        )}
        {loading&&!streamText&&(
          <div className="ai-msg assistant" style={{background:'color-mix(in srgb,var(--accent2) 8%,var(--surface))'}}>
            {searching&&<div style={{fontSize:11,color:'var(--accent2-d)',marginBottom:4}}>🔍 Searching the web...</div>}
            <ThinkingDots/>
          </div>
        )}
        {messages.length<=1&&!loading&&(
          <div style={{margin:'6px 0'}}>
            <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:7}}>Quick Actions</div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              {quickActions.map((a,i)=>(
                <button key={i} onClick={()=>send(a.m)} style={{textAlign:'left',padding:'7px 11px',background:'var(--surface)',border:'1.5px solid var(--border)',borderRadius:10,fontSize:12,cursor:'pointer',color:'var(--text2)',fontFamily:'var(--font)',display:'flex',alignItems:'center',gap:7,transition:'all 0.12s'}}
                  onMouseEnter={e=>{e.currentTarget.style.background='color-mix(in srgb,var(--accent) 8%,white)';e.currentTarget.style.borderColor='var(--accent)'}}
                  onMouseLeave={e=>{e.currentTarget.style.background='var(--surface)';e.currentTarget.style.borderColor='var(--border)'}}>
                  <span>{a.i}</span><span>{a.l}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* Input area */}
      <div className="ai-input-row">
        <input ref={inputRef} className="ai-input" style={{borderRadius:50,maxHeight:42}}
          placeholder={aiMode==='game'?'Talk to Sprout...':'Ask anything about your work...'}
          value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send()}
          disabled={loading}/>
        <button className="ai-send-btn" onClick={()=>send()} disabled={loading||!input.trim()}>
          {loading?<ThinkingDots/>:'↑'}
        </button>
      </div>
      <div style={{padding:'4px 14px 8px',textAlign:'center',fontSize:10,color:'var(--text3)'}}>
        Enter to send . <span style={{color:hasAI?'#22c55e':'#ef4444'}}>{hasAI?`🟢 ${providerLabels[provider]||provider} connected`:'🔴 No AI -- type for smart fallback'}</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// GARDEN DASHBOARD -- Isometric park with KPI buildings + NPCs
// ═══════════════════════════════════════════════════════════════
// Helper -- can't use CSS var() in JS directly
const var_r = 'var(--r)';

// ═══════════════════════════════════════════════════════════════
// GARDEN 3D -- Three.js isometric/tilt-view park dashboard
// ═══════════════════════════════════════════════════════════════
function Garden3D({buildings, season, tod, onEnter}) {
  const mountRef = useRef(null);
  const [hoverInfo, setHoverInfo] = useState(null);
  const [selected, setSelected]   = useState(null);
  const liveRef = useRef({hovered:null, selected:null, zoomTarget:null, defaultPos:null});

  const heightsKey = buildings.map(b=>`${b.id}:${b.h}:${b.value}`).join('|');

  useEffect(()=>{
    const mount = mountRef.current; if(!mount) return;
    if(!window.THREE){ mount.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px;flex-direction:column;gap:8px"><div>🌳</div><div>Loading 3D engine...</div></div>'; return; }
    const THREE = window.THREE;
    let width = mount.clientWidth||600, height = mount.clientHeight||380;
    try {

    const scene = new THREE.Scene();

    // ── Palette per season / time of day ──
    const SKY = {
      spring:{day:0xbfe8ff, hor:0xeaf7ff, ground:0x9ed87c, fog:0xd8f0e0, foliage:0x5a9e3c},
      summer:{day:0x87ceeb, hor:0xf0f8c0, ground:0x8ecb5e, fog:0xe8f4d0, foliage:0x4f9a3a},
      autumn:{day:0xf0c860, hor:0xf6dca0, ground:0xc9a667, fog:0xf0d8a0, foliage:0xd2741e},
      winter:{day:0xd4e8f8, hor:0xf4f9ff, ground:0xeaf3fb, fog:0xeef6ff, foliage:0xcfe0e8},
      rainy: {day:0x8898b0, hor:0xa0aec0, ground:0x7f9a6f, fog:0x9caab8, foliage:0x4a7a4a},
    };
    const pal = SKY[season] || SKY.spring;
    let skyColor = pal.day, fogColor = pal.fog, ambIntensity = 0.75, sunIntensity = 1.15, sunColor = 0xffffff, ambColor = 0xffffff;
    if(tod==='night'){ skyColor=0x0a1428; fogColor=0x0a1428; ambIntensity=0.42; sunIntensity=0.35; sunColor=0x8fb0ff; ambColor=0x3a5a8a; }
    else if(tod==='evening'){ skyColor=0xf3a96a; fogColor=0xf3c79a; ambIntensity=0.65; sunIntensity=0.9; sunColor=0xffd9a0; }

    scene.background = new THREE.Color(skyColor);
    scene.fog = new THREE.Fog(fogColor, 26, 70);

    // ── Camera: tilted "god view" -- above and slightly in front ──
    const camera = new THREE.PerspectiveCamera(38, width/height, 0.1, 300);
    const defaultPos = new THREE.Vector3(15, 15.5, 21);
    camera.position.copy(defaultPos);
    const camTarget = new THREE.Vector3(0,0.5,0);
    camera.lookAt(camTarget);
    liveRef.current.defaultPos = defaultPos;

    // ── Renderer ──
    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(width, height);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    mount.innerHTML='';
    mount.appendChild(renderer.domElement);

    // ── Lights ──
    scene.add(new THREE.AmbientLight(ambColor, ambIntensity));
    const sun = new THREE.DirectionalLight(sunColor, sunIntensity);
    sun.position.set(12, 22, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024,1024);
    sun.shadow.camera.left=-26; sun.shadow.camera.right=26; sun.shadow.camera.top=26; sun.shadow.camera.bottom=-26;
    sun.shadow.camera.far = 60;
    scene.add(sun);
    if(tod!=='night'){
      const hemi = new THREE.HemisphereLight(pal.hor, pal.ground, 0.5);
      scene.add(hemi);
    }

    // ── Ground ──
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(36, 48),
      new THREE.MeshStandardMaterial({color: pal.ground, roughness:0.95})
    );
    ground.rotation.x = -Math.PI/2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ── Circular path ──
    const path = new THREE.Mesh(
      new THREE.RingGeometry(9.5, 11, 64),
      new THREE.MeshStandardMaterial({color:0xe0d3b4, roughness:1})
    );
    path.rotation.x = -Math.PI/2; path.position.y = 0.01;
    scene.add(path);

    // ── Buildings ──
    const buildingMeshes = [];
    const N = buildings.length;
    buildings.forEach((b,i)=>{
      const angle = (i/N)*Math.PI*2 - Math.PI/2;
      const radius = 7.5;
      const px = Math.cos(angle)*radius, pz = Math.sin(angle)*radius;
      const bh = Math.max(1.4, Math.min(6, b.h/22));
      const bw = 2.0;

      const group = new THREE.Group();
      const color = new THREE.Color(b.color);

      const body = new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bw), new THREE.MeshStandardMaterial({color, roughness:0.55, metalness:0.08}));
      body.position.y = bh/2; body.castShadow = true; body.receiveShadow = true;
      group.add(body);

      const roof = new THREE.Mesh(new THREE.ConeGeometry(bw*0.78, 0.9, 4), new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.18}));
      roof.position.y = bh + 0.45; roof.rotation.y = Math.PI/4; roof.castShadow = true;
      group.add(roof);

      // Windows
      const winLit = tod==='night' || tod==='evening';
      const winMat = new THREE.MeshStandardMaterial({color: winLit?0xffe9a0:0xbfe7ff, emissive: winLit?0xffd87a:0x000000, emissiveIntensity: winLit?1.0:0});
      const rows = Math.max(1, Math.floor(bh*1.1));
      for(let r=0;r<rows;r++){
        const yy = 0.55 + r*0.85;
        if(yy > bh-0.2) break;
        [0,1,2,3].forEach(side=>{
          const win = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.32,0.04), winMat);
          const off = bw/2+0.02;
          if(side===0) win.position.set(0,yy,off);
          if(side===1) win.position.set(0,yy,-off);
          if(side===2){win.position.set(off,yy,0); win.rotation.y=Math.PI/2;}
          if(side===3){win.position.set(-off,yy,0); win.rotation.y=Math.PI/2;}
          group.add(win);
        });
      }

      // Floating icon billboard sprite (canvas texture)
      const iconCanvas = document.createElement('canvas');
      iconCanvas.width=128; iconCanvas.height=128;
      const ictx=iconCanvas.getContext('2d');
      ictx.font='80px serif'; ictx.textAlign='center'; ictx.textBaseline='middle';
      ictx.fillText(b.icon,64,70);
      const iconTex = new THREE.CanvasTexture(iconCanvas);
      const iconMat = new THREE.SpriteMaterial({map:iconTex, transparent:true});
      const iconSprite = new THREE.Sprite(iconMat);
      iconSprite.scale.set(1.1,1.1,1);
      iconSprite.position.y = bh + 1.3;
      group.add(iconSprite);

      // Pedestal
      const base = new THREE.Mesh(new THREE.CylinderGeometry(bw*0.85, bw*0.95, 0.25, 16), new THREE.MeshStandardMaterial({color:0xffffff, roughness:0.8}));
      base.position.y = 0.125; base.receiveShadow=true;
      group.add(base);

      group.position.set(px,0,pz);
      group.userData = {...b, bh, basePos:new THREE.Vector3(px,0,pz)};
      scene.add(group);
      buildingMeshes.push(group);
    });

    // ── Trees ──
    const treePositions = [[15,2],[-14,4],[10.5,-13],[-9,-14.5],[16.5,-6],[-15.5,-2],[3,16.5],[-4.5,15.5],[-17,9],[17,8]];
    treePositions.forEach(([x,z],i)=>{
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.22,1.3,6), new THREE.MeshStandardMaterial({color:0x8b6340, roughness:0.9}));
      trunk.position.y=0.65; trunk.castShadow=true;
      const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.95,1.9,8), new THREE.MeshStandardMaterial({color:pal.foliage, roughness:0.85}));
      foliage.position.y=1.85; foliage.castShadow=true;
      tree.add(trunk); tree.add(foliage);
      tree.position.set(x,0,z);
      const s=0.75+((i*37)%10)/14;
      tree.scale.setScalar(s);
      if(season==='winter'){
        const snowCap=new THREE.Mesh(new THREE.ConeGeometry(0.5,0.4,8), new THREE.MeshStandardMaterial({color:0xffffff}));
        snowCap.position.y=2.55; tree.add(snowCap);
      }
      scene.add(tree);
    });

    // ── NPCs ──
    const npcConfigs = [
      {color:0x6ba362, name:'Dev',   radius:10.25, speed:0.55, phase:0},
      {color:0x9b8ec4, name:'Aaron', radius:10.25, speed:0.4,  phase:Math.PI*0.5},
      {color:0xc8a040, name:'AI',    radius:10.25, speed:0.7,  phase:Math.PI},
      {color:0x7ab8d8, name:'PM',    radius:10.25, speed:0.45, phase:Math.PI*1.5},
    ];
    const npcMeshes = npcConfigs.map(cfg=>{
      const g = new THREE.Group();
      let bodyGeo;
      try { bodyGeo = new THREE.CapsuleGeometry(0.26,0.55,4,8); } catch { bodyGeo = new THREE.CylinderGeometry(0.26,0.26,1.0,8); }
      const body = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({color:cfg.color, roughness:0.6}));
      body.position.y=0.55; body.castShadow=true;
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.22,12,12), new THREE.MeshStandardMaterial({color:0xf5c580, roughness:0.7}));
      head.position.y=1.05; head.castShadow=true;
      g.add(body); g.add(head);
      g.userData = {...cfg};
      scene.add(g);
      return g;
    });

    // ── Night stars ──
    if(tod==='night'){
      const starCount=220;
      const positions=new Float32Array(starCount*3);
      for(let i=0;i<starCount;i++){
        const r=40+Math.random()*40, th=Math.random()*Math.PI*2, ph=Math.random()*Math.PI*0.5;
        positions[i*3]=r*Math.cos(th)*Math.cos(ph);
        positions[i*3+1]=8+r*Math.sin(ph);
        positions[i*3+2]=r*Math.sin(th)*Math.cos(ph);
      }
      const starGeo = new THREE.BufferGeometry();
      starGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
      scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.18,sizeAttenuation:true})));
    }

    // ── Weather particles ──
    let weather=null;
    if(season==='winter'||season==='rainy'){
      const count=320;
      const pos=new Float32Array(count*3);
      for(let i=0;i<count;i++){pos[i*3]=(Math.random()-0.5)*54;pos[i*3+1]=Math.random()*26;pos[i*3+2]=(Math.random()-0.5)*54;}
      const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
      weather = new THREE.Points(geo, new THREE.PointsMaterial({color:season==='winter'?0xffffff:0x9fc4e8, size:season==='winter'?0.14:0.07, transparent:true, opacity:0.8}));
      scene.add(weather);
    }

    // ── Interaction ──
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const findBuilding = (intersects) => {
      for(const it of intersects){
        let obj = it.object;
        while(obj && !obj.userData?.id) obj = obj.parent;
        if(obj) return obj;
      }
      return null;
    };

    const onMove = (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
      mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
      raycaster.setFromCamera(mouse, camera);
      const hit = findBuilding(raycaster.intersectObjects(buildingMeshes, true));
      renderer.domElement.style.cursor = hit ? 'pointer' : 'grab';
      liveRef.current.hovered = hit;
      if(hit){
        const vec = hit.userData.basePos.clone();
        vec.y = hit.userData.bh + 1.9;
        vec.project(camera);
        setHoverInfo({...hit.userData, x:(vec.x*0.5+0.5)*rect.width, y:(-vec.y*0.5+0.5)*rect.height});
      } else setHoverInfo(null);
    };

    const onClick = (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
      mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
      raycaster.setFromCamera(mouse, camera);
      const hit = findBuilding(raycaster.intersectObjects(buildingMeshes, true));
      if(hit){
        const bp = hit.userData.basePos;
        const dir = bp.clone().normalize();
        liveRef.current.zoomTarget = {
          pos: new THREE.Vector3(bp.x + dir.x*4 + 2.4, hit.userData.bh*0.7 + 2.2, bp.z + dir.z*4 + 2.4),
          look: new THREE.Vector3(bp.x, hit.userData.bh*0.5, bp.z),
        };
        liveRef.current.selected = hit.userData;
        setSelected(hit.userData);
        setHoverInfo(null);
      } else {
        liveRef.current.zoomTarget = {pos: defaultPos.clone(), look: new THREE.Vector3(0,0.5,0)};
        liveRef.current.selected = null;
        setSelected(null);
      }
    };

    renderer.domElement.addEventListener('mousemove', onMove);
    renderer.domElement.addEventListener('click', onClick);

    // ── Resize ──
    const onResize = () => {
      width = mount.clientWidth; height = mount.clientHeight;
      if(width===0||height===0) return;
      camera.aspect = width/height; camera.updateProjectionMatrix();
      renderer.setSize(width,height);
    };
    const ro = new ResizeObserver(onResize);
    ro.observe(mount);

    // ── Animation loop ──
    let raf, frame=0;
    const animate = () => {
      frame++;
      const orbitAngle = frame*0.0022;
      npcMeshes.forEach(npc=>{
        const a = npc.userData.phase + frame*0.006*npc.userData.speed;
        npc.position.x = Math.cos(a)*npc.userData.radius;
        npc.position.z = Math.sin(a)*npc.userData.radius;
        npc.position.y = 0.06 + Math.abs(Math.sin(frame*0.12))*0.08;
        npc.rotation.y = -a + Math.PI/2;
      });
      buildingMeshes.forEach(b=>{
        const isHover = liveRef.current.hovered===b;
        const isSel = liveRef.current.selected && liveRef.current.selected.id===b.userData.id;
        const targetScale = (isHover||isSel) ? 1.07 : 1;
        b.scale.lerp(new THREE.Vector3(targetScale,targetScale,targetScale), 0.15);
        b.position.y = Math.sin(frame*0.02 + b.userData.basePos.x) * 0.04;
      });
      if(weather){
        const positions = weather.geometry.attributes.position.array;
        const fall = season==='winter'?0.035:0.32;
        const drift = season==='winter'?0.01:0;
        for(let i=0;i<positions.length;i+=3){
          positions[i+1]-=fall; positions[i]+=Math.sin(frame*0.01+i)*drift*0.3;
          if(positions[i+1]<0){positions[i+1]=26; positions[i]=(Math.random()-0.5)*54; positions[i+2]=(Math.random()-0.5)*54;}
        }
        weather.geometry.attributes.position.needsUpdate=true;
      }
      // Gentle auto-orbit when not zoomed/selected
      if(!liveRef.current.zoomTarget && !liveRef.current.selected){
        const r = Math.sqrt(defaultPos.x**2+defaultPos.z**2);
        camera.position.x = Math.cos(orbitAngle)*r*0.04 + defaultPos.x*0.97;
        camera.position.z = Math.sin(orbitAngle)*r*0.04 + defaultPos.z*0.97;
        camera.position.y = defaultPos.y;
        camera.lookAt(camTarget);
      } else if(liveRef.current.zoomTarget){
        camera.position.lerp(liveRef.current.zoomTarget.pos, 0.07);
        camTarget.lerp(liveRef.current.zoomTarget.look, 0.07);
        camera.lookAt(camTarget);
        if(camera.position.distanceTo(liveRef.current.zoomTarget.pos)<0.02 && !liveRef.current.selected){
          liveRef.current.zoomTarget=null;
        }
      }
      renderer.render(scene, camera);
      raf = requestAnimationFrame(animate);
    };
    animate();

    return () => {
      cancelAnimationFrame(raf);
      ro.disconnect();
      renderer.domElement.removeEventListener('mousemove', onMove);
      renderer.domElement.removeEventListener('click', onClick);
      renderer.dispose();
      mount.innerHTML='';
    };
    } catch(err) {
      console.error('Garden3D error:', err);
      if(mount) mount.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px;flex-direction:column;gap:8px"><div>🌳</div><div>3D view unavailable</div></div>';
    }
  }, [season, tod, heightsKey]);

  const resetView = () => {
    if(liveRef.current.defaultPos){
      liveRef.current.zoomTarget = {pos: liveRef.current.defaultPos.clone(), look: new (window.THREE.Vector3)(0,0.5,0)};
    }
    liveRef.current.selected = null;
    setSelected(null);
  };

  return (
    <div ref={mountRef} style={{width:'100%',height:'100%',position:'relative',cursor:'grab'}}>
      {/* Hover tooltip */}
      {hoverInfo && !selected && (
        <div style={{position:'absolute',left:hoverInfo.x,top:hoverInfo.y,transform:'translate(-50%,-100%)',background:'rgba(0,0,0,0.78)',color:'white',borderRadius:10,padding:'6px 12px',fontSize:12,fontWeight:600,pointerEvents:'none',zIndex:5,backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,0.18)',whiteSpace:'nowrap'}}>
          {hoverInfo.icon} {hoverInfo.label}: <strong>{hoverInfo.value}</strong>
          <div style={{fontSize:10,opacity:0.7,marginTop:2}}>Click to enter →</div>
        </div>
      )}
      {/* Selected building detail panel */}
      {selected && (
        <div style={{position:'absolute',bottom:14,left:14,right:14,background:'rgba(255,255,255,0.92)',backdropFilter:'blur(12px)',borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:14,boxShadow:'0 8px 30px rgba(0,0,0,0.18)',border:'1.5px solid rgba(255,255,255,0.5)',zIndex:5,animation:'slideUp 0.2s ease'}}>
          <div style={{fontSize:30}}>{selected.icon}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:15,color:'#1e2d1a'}}>{selected.label}</div>
            <div style={{fontSize:12,color:'#5a7060'}}>Current count: <strong>{selected.value}</strong></div>
          </div>
          <button className="btn btn-primary btn-sm" onClick={()=>onEnter && onEnter(selected.id)}>Enter →</button>
          <button className="btn btn-ghost btn-sm" onClick={resetView}>Back</button>
        </div>
      )}
      {/* Controls hint */}
      {!selected && (
        <div style={{position:'absolute',bottom:10,right:14,background:'rgba(255,255,255,0.7)',borderRadius:20,padding:'4px 12px',fontSize:10.5,fontWeight:600,color:'#3a6a3a',backdropFilter:'blur(8px)',pointerEvents:'none'}}>
          🖱️ Click a building to zoom & enter
        </div>
      )}
    </div>
  );
}

function GardenDashboard({data, openWorkflow, setPage, mode, season, tod}) {
  const wfs   = data.workflows||[];
  const tasks = data.tasks||[];
  const clients= data.clients||[];

  const stats = {
    total:    wfs.length,
    active:   wfs.filter(w=>w.status==='In Progress').length,
    done:     wfs.filter(w=>w.status==='Complete').length,
    waiting:  wfs.filter(w=>['Testing','Waiting'].includes(w.status)).length,
    blocked:  wfs.filter(w=>w.status==='Blocked').length,
    urgTasks: tasks.filter(t=>t.priority==='High'&&t.status!=='Complete').length,
  };

  const buildings = [
    {id:'active', h:stats.active*22+40, color:'#e85d04', label:'Active', value:stats.active, icon:'⚡'},
    {id:'done',   h:stats.done*18+30,   color:'#0f0f0e', label:'Done',   value:stats.done,   icon:'✅'},
    {id:'wait',   h:stats.waiting*20+35,color:'#6b6b68', label:'Waiting',value:stats.waiting,icon:'⏳'},
    {id:'tasks',  h:stats.urgTasks*24+25,color:'#c44d00',label:'Urgent', value:stats.urgTasks,icon:'🔥'},
    {id:'clients',h:clients.length*26+30,color:'#3a3a38',label:'Clients',value:clients.length,icon:'👥'},
  ];

  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const hour = new Date().getHours();
  const greeting = hour<12?'Good morning':hour<18?'Good afternoon':'Good evening';

  const handleEnter = (id) => {
    if(id==='clients') setPage('clients');
    else if(id==='tasks') setPage('tasks');
    else setPage('automations');
  };

  const ringPct = stats.total > 0 ? Math.round((stats.done/stats.total)*100) : 0;
  const ringOffset = 157 - (ringPct/100)*157;

  const kpis = [
    {id:'active',  icon:'⚡', label:'Active Workflows', val:stats.active,   sub:`of ${wfs.length} total`,            c:'#e85d04', click:'automations'},
    {id:'tasks',   icon:'✅', label:'Open Tasks',       val:tasks.filter(t=>t.status!=='Complete').length, sub:`${stats.urgTasks} high priority`, c:'#ef4444', click:'tasks'},
    {id:'done',    icon:'🏆', label:'Completed',        val:stats.done,     sub:`${ringPct}% success rate`,           c:'#22c55e', click:'automations'},
    {id:'waiting', icon:'⏳', label:'Waiting On',       val:stats.waiting,  sub:`${stats.blocked} blocked`,           c:'#f59e0b', click:'automations'},
    {id:'clients', icon:'👥', label:'Clients',          val:clients.length, sub:`${clients.filter(c=>c.status==='Active').length} active`, c:'#6366f1', click:'clients'},
  ];

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20,paddingBottom:8}}>

      {/* ── Page header ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:26,color:'var(--text)',letterSpacing:'-0.5px'}}>
            {greeting}{data.currentUser?.name?`, ${data.currentUser.name.split(' ')[0]}`:''}
          </div>
          <div style={{fontSize:12.5,color:'var(--text3)',marginTop:3,display:'flex',alignItems:'center',gap:8}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',display:'inline-block',boxShadow:'0 0 6px #22c55e'}}/>
            {today} · All systems operational
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setPage('tasks')}>📋 Tasks</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setPage('automations')}>+ New Automation</button>
        </div>
      </div>

      {/* ── KPI row: 5 equal cards, clean & consistent ── */}
      <div className="kpi-scene">
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}}>
          {kpis.map((k,i)=>(
            <div key={k.id} className="kpi-card-3d card" style={{
              '--kpi-c':k.c, padding:'18px 18px 20px', cursor:'pointer',
              boxShadow:'0 10px 30px rgba(0,0,0,0.07), 0 2px 8px rgba(0,0,0,0.05)',
            }} onClick={()=>setPage(k.click)}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
                <div style={{width:36,height:36,borderRadius:9,background:`color-mix(in srgb, ${k.c} 14%, var(--surface2))`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>
                  {k.icon}
                </div>
                <div style={{fontSize:9,fontWeight:700,color:k.c,background:`color-mix(in srgb, ${k.c} 12%, transparent)`,padding:'2px 7px',borderRadius:10}}>LIVE</div>
              </div>
              <div className="kpi-number" style={{fontSize:36}}>{k.val}</div>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-sub">{k.sub}</div>
              <div className="kpi-accent-bar"/>
            </div>
          ))}
        </div>
      </div>

      {/* ── Hero: Progress overview + 3D Park side by side ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 380px',gap:14}}>

        {/* Left: progress overview card */}
        <div className="card" style={{padding:'24px 26px',display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:20,marginBottom:20}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:8}}>
                Overall Progress
              </div>
              <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:30,color:'var(--text)',letterSpacing:'-1px'}}>
                {stats.total} Total Workflows
              </div>
              <div style={{fontSize:12.5,color:'var(--text3)',marginTop:6,lineHeight:1.6,maxWidth:320}}>
                {tasks.filter(t=>t.status!=='Complete').length} open tasks across {clients.length} client{clients.length!==1?'s':''}. {stats.done} workflows shipped to date.
              </div>
            </div>
            <div style={{textAlign:'center',flexShrink:0}}>
              <div className="kpi-ring-wrap" style={{width:76,height:76,'--kpi-c':'var(--accent)'}}>
                <svg width="76" height="76" viewBox="0 0 56 56">
                  <circle className="kpi-ring-bg" cx="28" cy="28" r="25"/>
                  <circle className="kpi-ring-fill" cx="28" cy="28" r="25" style={{strokeDashoffset: ringOffset}}/>
                </svg>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-h)',fontWeight:800,fontSize:16,color:'var(--accent)'}}>
                  {ringPct}%
                </div>
              </div>
              <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginTop:5}}>Complete</div>
            </div>
          </div>

          {/* Status breakdown bars */}
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {[
              {label:'Active',  val:stats.active,  total:stats.total, c:'#e85d04'},
              {label:'Waiting', val:stats.waiting, total:stats.total, c:'#f59e0b'},
              {label:'Blocked', val:stats.blocked, total:stats.total, c:'#ef4444'},
              {label:'Done',    val:stats.done,    total:stats.total, c:'#22c55e'},

// Garden Park Canvas Drawing
function initNPCs(S, canvas) {
  const W=canvas.width, H=canvas.height;
  S.npcs = [
    {x:W*0.3,y:H*0.7,vx:0.6,vy:0,type:'worker',color:'#6ba362',phase:0,name:'Dev'},
    {x:W*0.5,y:H*0.75,vx:-0.4,vy:0,type:'client',color:'#9b8ec4',phase:1,name:'Aaron'},
    {x:W*0.7,y:H*0.72,vx:0.5,vy:0,type:'ai',color:'#c8a040',phase:2,name:'AI'},
    {x:W*0.2,y:H*0.78,vx:0.3,vy:0,type:'worker',color:'#7ab8d8',phase:3,name:'PM'},
  ];
}

function drawGardenPark(ctx, canvas, S, buildings, mode) {
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Sky
  const skyGr=ctx.createLinearGradient(0,0,0,H*0.5);
  skyGr.addColorStop(0,'#c8e8ff'); skyGr.addColorStop(1,'#e0f8d0');
  ctx.fillStyle=skyGr; ctx.fillRect(0,0,W,H);

  // Ground
  const grGr=ctx.createLinearGradient(0,H*0.5,0,H);
  grGr.addColorStop(0,'#c0e8a0'); grGr.addColorStop(1,'#a8d880');
  ctx.fillStyle=grGr; ctx.fillRect(0,H*0.5,W,H*0.5);

  // Path
  ctx.fillStyle='rgba(210,190,150,0.5)';
  ctx.beginPath(); ctx.ellipse(W*0.45,H*0.72,W*0.25,H*0.1,0,0,Math.PI*2); ctx.fill();

  // KPI Buildings (isometric style)
  buildings.forEach(b=>{
    const bx=b.x*W, by=b.y*H, bw=44, bh=b.h;
    const pulse=Math.sin(S.frame*0.04)*4;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.ellipse(bx,by+8,bw*0.7,10,0,0,Math.PI*2); ctx.fill();
    // Building body
    ctx.fillStyle=b.color+'cc';
    ctx.beginPath();
    ctx.moveTo(bx-bw/2, by); ctx.lineTo(bx+bw/2, by);
    ctx.lineTo(bx+bw/2, by-bh+pulse); ctx.lineTo(bx-bw/2, by-bh+pulse);
    ctx.closePath(); ctx.fill();
    // Shiny face
    const grad=ctx.createLinearGradient(bx-bw/2,0,bx+bw/2,0);
    grad.addColorStop(0,'rgba(255,255,255,0.25)'); grad.addColorStop(1,'rgba(0,0,0,0.08)');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.moveTo(bx-bw/2,by); ctx.lineTo(bx+bw/2,by);
    ctx.lineTo(bx+bw/2,by-bh+pulse); ctx.lineTo(bx-bw/2,by-bh+pulse);
    ctx.closePath(); ctx.fill();
    // Isometric top
    ctx.fillStyle=b.color+'ee';
    ctx.beginPath();
    ctx.moveTo(bx-bw/2,by-bh+pulse); ctx.lineTo(bx,by-bh-14+pulse);
    ctx.lineTo(bx+bw/2,by-bh+pulse); ctx.lineTo(bx,by-bh+14+pulse);
    ctx.closePath(); ctx.fill();
    // Windows
    ctx.fillStyle='rgba(200,240,255,0.6)';
    for(let wy=by-bh+pulse+16;wy<by-14;wy+=18){
      for(let wx=bx-bw/2+8;wx<bx+bw/2-8;wx+=14){
        ctx.fillRect(wx,wy,8,10);
      }
    }
    // Icon + label
    ctx.font='16px serif'; ctx.textAlign='center';
    ctx.fillText(b.icon, bx, by-bh+pulse-18);
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.font='bold 11px Inter,sans-serif';
    ctx.fillText(`${b.label}: ${b.value}`, bx, by+18);
  });

  // Trees (decorative)
  [[W*0.05,H*0.62],[W*0.85,H*0.58],[W*0.12,H*0.75],[W*0.88,H*0.72],[W*0.45,H*0.55]].forEach(([tx,ty],i)=>{
    const ts=20+Math.sin(i)*8;
    const wb=Math.sin(S.frame*0.02+i)*2;
    ctx.fillStyle='#8B6340';
    ctx.fillRect(tx-3,ty,6,ts*0.8);
    ctx.fillStyle='rgba(80,160,60,0.8)';
    ctx.save(); ctx.translate(tx,ty); ctx.rotate(wb*0.02);
    ctx.beginPath(); ctx.arc(0,-ts*0.6,ts*0.7,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  // Flowers
  [[W*0.3,H*0.82],[W*0.6,H*0.85],[W*0.75,H*0.8]].forEach(([fx,fy],i)=>{
    const cols=['#f4a0c0','#f4e060','#c0d4f4'];
    ctx.fillStyle=cols[i%cols.length]+'aa';
    for(let p=0;p<5;p++){
      const a=(p/5)*Math.PI*2;
      ctx.beginPath(); ctx.arc(fx+Math.cos(a)*6,fy+Math.sin(a)*6,5,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle='#f8e060'; ctx.beginPath(); ctx.arc(fx,fy,3,0,Math.PI*2); ctx.fill();
  });

  // NPCs
  if(!S.npcs||!S.npcs.length) initNPCs(S,canvas);
  S.npcs.forEach(npc=>{
    npc.x+=npc.vx; npc.phase+=0.06;
    if(npc.x<30||npc.x>W-30) npc.vx*=-1;
    const bob=Math.sin(npc.phase)*3;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.beginPath(); ctx.ellipse(npc.x,npc.y+12,10,4,0,0,Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle=npc.color+'dd';
    ctx.beginPath(); ctx.ellipse(npc.x,npc.y+bob-8,7,10,0,0,Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle='#f5c580';
    ctx.beginPath(); ctx.arc(npc.x,npc.y+bob-22,7,0,Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle='#333';
    const eyeX=npc.vx>0?npc.x+2:npc.x-2;
    ctx.beginPath(); ctx.arc(eyeX,npc.y+bob-23,1.5,0,Math.PI*2); ctx.fill();
    // Name tag
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 8px Inter,sans-serif';
    const tw=ctx.measureText(npc.name).width;
    ctx.fillRect(npc.x-tw/2-3,npc.y+bob-35,tw+6,11);
    ctx.fillStyle='#333'; ctx.textAlign='center';
    ctx.fillText(npc.name,npc.x,npc.y+bob-26);
    ctx.textAlign='left';
  });

  // Floating particles (nature)
  if(!S.particles.length) for(let i=0;i<15;i++) S.particles.push({x:Math.random()*W,y:Math.random()*H*0.6,vx:(Math.random()-0.5)*0.3,vy:-0.2-Math.random()*0.3,size:2+Math.random()*3,op:0.3+Math.random()*0.5,color:['#c8f0a0','#f0c8a0','#a0c8f0'][Math.floor(Math.random()*3)]});
  S.particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; if(p.y<-10){p.y=H;p.x=Math.random()*W;}
    ctx.globalAlpha=p.op; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
}

      <div style={{display:'flex',gap:8,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:6,flex:1,flexWrap:'wrap'}}>
          {statuses.map(s=><button key={s} className={`btn btn-sm ${filter===s?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(s)}>{s}</button>)}
        </div>
        <button className="btn btn-primary" onClick={()=>{setBuilderWf(null);setView('builder');}}>⚡ New Automation</button>
      </div>
      <div className="card">
        <table className="data-table">
          <thead><tr><th>Automation</th><th>Client</th><th>Status</th><th>Progress</th><th>Priority</th><th>Next Action</th><th></th></tr></thead>
          <tbody>
            {filtered.map(wf=>{
              const client=(data.clients||[]).find(c=>c.id===wf.clientId);
              return (
                <tr key={wf.id} style={{cursor:'pointer'}} onClick={()=>openWorkflow(wf)}>
                  <td><div style={{fontWeight:700,fontSize:13}}>{wf.name}</div><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{wf.summary?.slice(0,55)}...</div></td>
                  <td style={{fontSize:12,color:'var(--text2)'}}>{client?.name||'--'}</td>
                  <td><StatusBadge status={wf.status}/></td>
                  <td style={{minWidth:100}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{flex:1}}><ProgBar pct={wf.progress}/></div>
                      <span style={{fontSize:11,color:'var(--text3)',width:30}}>{wf.progress}%</span>
                    </div>
                  </td>
                  <td><PriLabel p={wf.priority}/></td>
                  <td style={{fontSize:12,color:'var(--text2)',maxWidth:180}}>{wf.nextAction}</td>
                  <td onClick={e=>e.stopPropagation()}>
                    <button className="btn btn-ghost btn-xs" onClick={()=>{setBuilderWf(wf);setView('builder');}}>⚙️ Edit</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{textAlign:'center',padding:30,color:'var(--text3)'}}>No workflows found</div>}
      </div>
    </div>
  );
}
