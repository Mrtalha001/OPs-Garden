function AutomationBuilder({data, update, onBack, workflow}) {
  const [name, setName]       = useState(workflow?.name||'New Automation');
  const [trigger, setTrigger] = useState(null);
  const [actions, setActions] = useState([]);
  const [step, setStep]       = useState('trigger'); // trigger | actions | settings | test
  const [testLog, setTestLog] = useState([]);
  const [testing, setTesting] = useState(false);
  const [saved, setSaved]     = useState(false);

  const addAction = (a) => setActions(prev=>[...prev,{...a,id:'a'+Date.now(),config:{}}]);
  const removeAction = id => setActions(prev=>prev.filter(a=>a.id!==id));
  const moveAction = (id, dir) => {
    setActions(prev=>{
      const idx=prev.findIndex(a=>a.id===id); if(idx<0) return prev;
      const arr=[...prev]; const ni=idx+dir;
      if(ni<0||ni>=arr.length) return arr;
      [arr[idx],arr[ni]]=[arr[ni],arr[idx]]; return arr;
    });
  };

  const runTest = async () => {
    setTesting(true); setTestLog([]);
    const log=m=>setTestLog(p=>[...p,{ts:new Date().toLocaleTimeString(),msg:m}]);
    log('🚀 Starting automation test...');
    await new Promise(r=>setTimeout(r,600));
    if(trigger) log(`✅ Trigger "${trigger.label}" -- simulated payload received`);
    else { log('❌ No trigger set. Add a trigger first.'); setTesting(false); return; }
    for(const a of actions){
      await new Promise(r=>setTimeout(r,400));
      log(`⚙️ Running action: ${a.label}...`);
      await new Promise(r=>setTimeout(r,500));
      log(`✅ ${a.label} -- completed successfully (simulated)`);
    }
    log('🎉 Automation test complete!');
    setTesting(false);
  };

  const save = () => {
    if(!trigger) return alert('Add a trigger first!');
    const wfData={
      id:workflow?.id||'wf'+Date.now(),
      name, status:'Active', progress:10, priority:'Medium', urgency:'Low',
      clientId:workflow?.clientId||(data.clients?.[0]?.id||''),
      summary:`Automation: ${trigger.label} → ${actions.map(a=>a.label).join(' → ')}`,
      platformTo:'OpsGarden', platformFrom:'Manual',
      nextAction:'Monitor automation', tags:['Automation'],
      trigger, actions,
      ...workflow,
    };
    const existing=(data.workflows||[]).find(w=>w.id===wfData.id);
    if(existing) update('workflows',(data.workflows||[]).map(w=>w.id===wfData.id?wfData:w));
    else update('workflows',[...(data.workflows||[]),wfData]);
    setSaved(true); setTimeout(()=>{setSaved(false);onBack();},1000);
  };

  const steps=[{id:'trigger',label:'1. Trigger'},{id:'actions',label:'2. Actions'},{id:'settings',label:'3. Settings'},{id:'test',label:'4. Test & Save'}];

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
        <input value={name} onChange={e=>setName(e.target.value)} style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:20,border:'none',outline:'none',background:'transparent',color:'var(--text)',flex:1}}/>
        <button className="btn btn-primary" onClick={save}>{saved?'✅ Saved!':'💾 Save'}</button>
      </div>

      {/* Step tabs */}
      <div style={{display:'flex',gap:4,marginBottom:20,background:'var(--surface2)',borderRadius:var_r,padding:4}}>
        {steps.map(s=>(
          <button key={s.id} onClick={()=>setStep(s.id)} style={{flex:1,padding:'8px 12px',borderRadius:10,border:'none',background:step===s.id?'var(--surface)':'transparent',fontWeight:step===s.id?700:500,color:step===s.id?'var(--accent-d)':'var(--text3)',cursor:'pointer',fontFamily:'var(--font)',fontSize:12.5,boxShadow:step===s.id?'var(--shadow)':'none',transition:'all 0.15s'}}>
            {s.label}
          </button>
        ))}
      </div>

      {/* Trigger step */}
      {step==='trigger'&&(
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="detail-section-title">⚡ Choose a Trigger</div>
            <div style={{fontSize:13,color:'var(--text3)',marginBottom:16}}>A trigger is the event that starts your automation.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
              {TRIGGER_TYPES.map(t=>(
                <div key={t.id} onClick={()=>setTrigger(t)} style={{padding:'12px 14px',borderRadius:var_r,border:`2px solid ${trigger?.id===t.id?'var(--accent)':'var(--border)'}`,background:trigger?.id===t.id?'color-mix(in srgb,var(--accent) 8%,white)':'var(--surface)',cursor:'pointer',transition:'all 0.15s'}}>
                  <div style={{fontSize:22,marginBottom:6}}>{t.icon}</div>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{t.label}</div>
                  <div style={{fontSize:11.5,color:'var(--text3)'}}>{t.desc}</div>
                </div>
              ))}
            </div>
          </div>
          {trigger&&(
            <div className="card" style={{background:'color-mix(in srgb,var(--accent) 6%,white)',border:'1.5px solid var(--accent)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:28}}>{trigger.icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14}}>Selected: {trigger.label}</div>
                  <div style={{fontSize:12,color:'var(--text3)'}}>{trigger.desc}</div>
                </div>
                <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>setStep('actions')}>Next: Add Actions →</button>
              </div>
              {trigger.id==='webhook'&&(
                <div style={{marginTop:14,padding:'10px 14px',background:'var(--surface2)',borderRadius:10}}>
                  <div style={{fontSize:11.5,fontWeight:700,color:'var(--text3)',marginBottom:6}}>Webhook URL (copy and use in other platforms)</div>
                  <div style={{fontFamily:'monospace',fontSize:12,color:'var(--accent-d)',background:'var(--surface)',padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)'}}>
                    https://opsgarden.app/hooks/{Math.random().toString(36).slice(2,10)}
                  </div>
                </div>
              )}
              {trigger.id==='schedule'&&(
                <div style={{marginTop:14,display:'flex',gap:10}}>
                  <div className="form-group" style={{flex:1,margin:0}}>
                    <label className="form-label">Run every</label>
                    <select className="form-select"><option>15 minutes</option><option>1 hour</option><option>Daily</option><option>Weekly</option><option>Monthly</option></select>
                  </div>
                </div>
              )}
              {trigger.id==='zapier_trigger'&&(
                <div style={{marginTop:14,padding:'12px 14px',background:'var(--surface2)',borderRadius:10,border:'1px solid #ff4f0022'}}>
                  <div style={{fontSize:11.5,fontWeight:700,color:'var(--text3)',marginBottom:8}}>⚡ Zapier "Catch Hook" URL</div>
                  <div style={{fontSize:11.5,color:'var(--text3)',marginBottom:8,lineHeight:1.6}}>
                    In Zapier, create a Zap with trigger <strong>Webhooks by Zapier → Catch Hook</strong>, then paste the URL it gives you into your Zap's last step pointing here, OR copy this URL into a Zapier "Webhooks → POST" action to send data into OpsGarden:
                  </div>
                  <div style={{fontFamily:'monospace',fontSize:12,color:'var(--accent-d)',background:'var(--surface)',padding:'8px 12px',borderRadius:8,border:'1px solid var(--border)'}}>
                    https://opsgarden.app/hooks/zapier/{Math.random().toString(36).slice(2,10)}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Actions step */}
      {step==='actions'&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div>
            <div className="card">
              <div className="detail-section-title">➕ Add Actions</div>
              <div style={{fontSize:13,color:'var(--text3)',marginBottom:14}}>Actions run in order after the trigger fires.</div>
              <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:440,overflowY:'auto'}}>
                {ACTION_TYPES.map(a=>(
                  <div key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--surface)',cursor:'pointer',transition:'all 0.12s'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}
                    onClick={()=>addAction(a)}>
                    <span style={{fontSize:20}}>{a.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:12.5}}>{a.label}</div>
                      <div style={{fontSize:11,color:'var(--text3)'}}>{a.desc}</div>
                    </div>
                    <span style={{fontSize:10,background:'var(--surface2)',padding:'2px 7px',borderRadius:20,color:'var(--text3)',fontWeight:600}}>{a.platform}</span>
                    <button style={{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--accent)',fontWeight:700}}>+</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div>
            <div className="card">
              <div className="detail-section-title">🔄 Flow Builder</div>
              {/* Trigger */}
              <div style={{padding:'10px 14px',background:'color-mix(in srgb,var(--accent) 12%,white)',borderRadius:10,border:'2px solid var(--accent)',marginBottom:8}}>
                <div style={{fontWeight:700,fontSize:13}}>{trigger?.icon} {trigger?.label||'No trigger set'}</div>
                <div style={{fontSize:11,color:'var(--text3)'}}>Trigger</div>
              </div>
              {/* Arrow */}
              {actions.length>0&&<div style={{textAlign:'center',fontSize:18,color:'var(--text3)',margin:'4px 0'}}>↓</div>}
              {/* Actions */}
              {actions.map((a,i)=>(
                <div key={a.id}>
                  <div style={{padding:'10px 14px',background:'var(--surface2)',borderRadius:10,border:'1.5px solid var(--border)',marginBottom:4,display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:18}}>{a.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:12.5}}>{a.label}</div>
                      <div style={{fontSize:11,color:'var(--text3)'}}>{a.platform}</div>
                    </div>
                    <div style={{display:'flex',gap:3}}>
                      {i>0&&<button onClick={()=>moveAction(a.id,-1)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)'}}>↑</button>}
                      {i<actions.length-1&&<button onClick={()=>moveAction(a.id,1)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--text3)'}}>↓</button>}
                      <button onClick={()=>removeAction(a.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'#e07a7a'}}>✕</button>
                    </div>
                  </div>
                  {i<actions.length-1&&<div style={{textAlign:'center',fontSize:16,color:'var(--text3)',margin:'2px 0'}}>↓</div>}
                </div>
              ))}
              {actions.length===0&&(
                <div style={{textAlign:'center',padding:'20px 0',color:'var(--text3)',fontSize:13,borderTop:'1px dashed var(--border)',marginTop:8}}>Add actions from the left panel</div>
              )}
              {actions.some(a=>a.id.startsWith('a')&&a.platform==='Zapier')&&(
                <div style={{marginTop:12,padding:'12px 14px',background:'#fff7f0',borderRadius:10,border:'1px solid #ffd9b8'}}>
                  <div style={{fontSize:11.5,fontWeight:700,color:'#a04000',marginBottom:8}}>⚡ Connect a Zapier App</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {ZAPIER_APP_LIBRARY.map(app=>(
                      <span key={app.id} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 10px',background:'var(--surface2)',borderRadius:20,fontSize:11,fontWeight:600,border:'1px solid var(--border)',cursor:'pointer'}}>
                        {app.icon} {app.label}
                      </span>
                    ))}
                  </div>
                  <div style={{fontSize:10.5,color:'#a04000',marginTop:8}}>5,000+ apps available via Zapier -- this picker shows popular ones. Full catalog opens in Zapier when you connect.</div>
                </div>
              )}
              {actions.length>0&&(
                <button className="btn btn-primary btn-sm" style={{width:'100%',marginTop:12}} onClick={()=>setStep('test')}>→ Proceed to Test</button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Settings step */}
      {step==='settings'&&(
        <div className="card">
          <div className="detail-section-title">⚙️ Automation Settings</div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Client</label>
              <select className="form-select">
                <option value="">-- None --</option>
                {(data.clients||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Priority</label>
              <select className="form-select"><option>Low</option><option>Medium</option><option>High</option></select>
            </div>
          </div>
          <div className="form-group"><label className="form-label">Description / Notes</label>
            <textarea className="form-textarea" placeholder="What does this automation do?"/>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'var(--surface2)',borderRadius:10}}>
            <input type="checkbox" defaultChecked style={{accentColor:'var(--accent)'}}/>
            <div><div style={{fontWeight:700,fontSize:13}}>Active</div><div style={{fontSize:11.5,color:'var(--text3)'}}>Automation will run when triggered</div></div>
          </div>
          <button className="btn btn-primary btn-sm" style={{marginTop:16}} onClick={()=>setStep('test')}>→ Test & Save</button>
        </div>
      )}

      {/* Test step */}
      {step==='test'&&(
        <div className="card">
          <div className="detail-section-title">🧪 Test & Save</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
            <div style={{padding:'14px',background:'var(--surface2)',borderRadius:var_r}}>
              <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>Automation Summary</div>
              <div style={{fontSize:12.5,color:'var(--text2)',lineHeight:1.8}}>
                <div>📌 <strong>Name:</strong> {name}</div>
                <div>⚡ <strong>Trigger:</strong> {trigger?.label||'Not set'}</div>
                <div>🔄 <strong>Actions:</strong> {actions.length} steps</div>
                {actions.map((a,i)=><div key={a.id} style={{paddingLeft:16,color:'var(--text3)',fontSize:11.5}}>{i+1}. {a.icon} {a.label}</div>)}
              </div>
            </div>
            <div style={{padding:'14px',background:'var(--surface2)',borderRadius:var_r}}>
              <div style={{fontWeight:700,marginBottom:10,fontSize:13}}>🔌 Platform Requirements</div>
              {[...new Set(actions.map(a=>a.platform))].filter(p=>p!=='Internal').map(p=>(
                <div key={p} style={{padding:'7px 10px',background:'var(--surface)',borderRadius:8,marginBottom:6,fontSize:12,display:'flex',alignItems:'center',gap:8}}>
                  <span style={{width:7,height:7,borderRadius:'50%',background:'var(--w-gold)',display:'inline-block'}}/>
                  {p} -- configure in Settings → Integrations
                </div>
              ))}
              {actions.every(a=>a.platform==='Internal')&&<div style={{fontSize:12,color:'var(--text3)'}}>✅ All internal actions -- no external platforms needed.</div>}
            </div>
          </div>
          <div style={{background:'#1e2835',borderRadius:var_r,padding:'14px',marginBottom:14,minHeight:140,fontFamily:'monospace',fontSize:12,color:'#a0c8a0',maxHeight:220,overflowY:'auto'}}>
            {testLog.length===0&&<div style={{color:'#557755'}}>// Click "Run Test" to simulate your automation...</div>}
            {testLog.map((l,i)=><div key={i}><span style={{color:'#557755'}}>[{l.ts}]</span> {l.msg}</div>)}
            {testing&&<div style={{color:'#c8a040'}}>{'> '}<ThinkingDots/></div>}
          </div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost" onClick={runTest} disabled={testing}>🧪 {testing?'Testing...':'Run Test'}</button>
            <button className="btn btn-primary" onClick={save}>💾 Save Automation</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Tasks Page -- Full Project Management ─────────────────────
function TasksPage({data, update}) {
  const [view, setView] = useState('list'); // list | kanban
  const [filter, setFilter] = useState('Open');
  const [showModal, setShowModal] = useState(false);
  const [selTask, setSelTask] = useState(null);
  const [form, setForm] = useState({name:'',workflowId:'',clientId:'',priority:'Medium',status:'Not Started',owner:'',dueDate:'',blocker:'',nextAction:'',notes:'',tags:''});
  const f = k => e => setForm(p=>({...p,[k]:e.target.value}));

  const tasks = data.tasks||[];
  const filtered = filter==='All' ? tasks : filter==='Open' ? tasks.filter(t=>t.status!=='Complete') : filter==='Complete' ? tasks.filter(t=>t.status==='Complete') : tasks.filter(t=>t.priority==='High'&&t.status!=='Complete');

  const addTask = () => {
    const nt={...form,id:'t'+Date.now(),subtasks:[],comments:[],tags:form.tags.split(',').map(t=>t.trim()).filter(Boolean),createdAt:new Date().toISOString().split('T')[0]};
    update('tasks',[...tasks,nt]); setShowModal(false);
    setForm({name:'',workflowId:'',clientId:'',priority:'Medium',status:'Not Started',owner:'',dueDate:'',blocker:'',nextAction:'',notes:'',tags:''});
  };
  const toggleDone = id => update('tasks',tasks.map(t=>t.id===id?{...t,status:t.status==='Complete'?'In Progress':'Complete'}:t));
  const delTask = id => { update('tasks',tasks.filter(t=>t.id!==id)); setSelTask(null); };

  const KANBAN_COLS = ['Not Started','In Progress','Waiting','Blocked','Complete'];
  const colColors  = {'Not Started':'#b0b8c1','In Progress':'#7aaee0','Waiting':'#e4b86a','Blocked':'#e07a7a','Complete':'#6dbfa0'};

  const stats = {
    total:    tasks.length,
    open:     tasks.filter(t=>t.status!=='Complete').length,
    high:     tasks.filter(t=>t.priority==='High'&&t.status!=='Complete').length,
    done:     tasks.filter(t=>t.status==='Complete').length,
    blocked:  tasks.filter(t=>t.status==='Blocked').length,
  };

  return (
    <div>
      {/* Stats row */}
      <div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap'}}>
        {[{l:'Total',v:stats.total,c:'var(--accent)'},{l:'Open',v:stats.open,c:'var(--progress)'},{l:'High Priority',v:stats.high,c:'#e07a7a'},{l:'Complete',v:stats.done,c:'#6dbfa0'},{l:'Blocked',v:stats.blocked,c:'#e07a7a'}].map(s=>(
          <div key={s.l} style={{background:'var(--surface)',borderRadius:10,padding:'10px 16px',border:'1.5px solid var(--border)',minWidth:90,boxShadow:'var(--shadow)'}}>
            <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.6,marginBottom:4}}>{s.l}</div>
            <div style={{fontFamily:'var(--font-h)',fontWeight:900,fontSize:24,color:s.c}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Controls */}
      <div style={{display:'flex',gap:8,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:5,background:'var(--surface2)',borderRadius:50,padding:3,border:'1.5px solid var(--border)'}}>
          {['Open','All','High Priority','Complete'].map(f2=>(
            <button key={f2} className={`btn btn-sm ${filter===f2?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(f2)} style={{borderRadius:50,border:'none'}}>{f2}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:5,marginLeft:'auto'}}>
          <button className={`btn btn-sm ${view==='list'?'btn-primary':'btn-ghost'}`} onClick={()=>setView('list')}>☰ List</button>
          <button className={`btn btn-sm ${view==='kanban'?'btn-primary':'btn-ghost'}`} onClick={()=>setView('kanban')}>⬛ Kanban</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowModal(true)}>+ Add Task</button>
        </div>
      </div>

      {/* List view */}
      {view==='list'&&(
        <div className="card" style={{overflow:'auto'}}>
          <table className="data-table">
            <thead><tr><th></th><th>Task</th><th>Client</th><th>Priority</th><th>Status</th><th>Owner</th><th>Due</th><th>Blocker</th><th></th></tr></thead>
            <tbody>
              {filtered.map(t=>{
                const wf=(data.workflows||[]).find(w=>w.id===t.workflowId);
                const client=(data.clients||[]).find(c=>c.id===t.clientId);
                const overdue = t.dueDate && new Date(t.dueDate)<new Date() && t.status!=='Complete';
                return (
                  <tr key={t.id} style={{opacity:t.status==='Complete'?0.55:1}}>
                    <td style={{width:36}}>
                      <input type="checkbox" checked={t.status==='Complete'} onChange={()=>toggleDone(t.id)} style={{accentColor:'var(--accent)',width:15,height:15,cursor:'pointer'}}/>
                    </td>
                    <td style={{cursor:'pointer'}} onClick={()=>setSelTask(t)}>
                      <div style={{fontWeight:700,fontSize:13,textDecoration:t.status==='Complete'?'line-through':'none'}}>{t.name}</div>
                      {wf&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>⚡ {wf.name}</div>}
                      {t.nextAction&&<div style={{fontSize:11,color:'var(--accent-d)',marginTop:2}}>→ {t.nextAction}</div>}
                    </td>
                    <td style={{fontSize:12,color:'var(--text2)'}}>{client?.name||'--'}</td>
                    <td><PriLabel p={t.priority}/></td>
                    <td><StatusBadge status={t.status}/></td>
                    <td style={{fontSize:12}}>{t.owner||'--'}</td>
                    <td style={{fontSize:12,color:overdue?'#e07a7a':'var(--text2)',fontWeight:overdue?700:400}}>{t.dueDate||'--'}{overdue&&' ⚠️'}</td>
                    <td style={{fontSize:12,color:'var(--text3)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.blocker||'--'}</td>
                    <td>
                      <div style={{display:'flex',gap:4}}>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setSelTask(t)}>👁</button>
                        <button className="btn btn-danger btn-xs" onClick={()=>delTask(t.id)}>✕</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {filtered.length===0&&<div style={{textAlign:'center',padding:30,color:'var(--text3)'}}>No tasks found ✨</div>}
        </div>
      )}

      {/* Kanban view */}
      {view==='kanban'&&(
        <div style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:8,alignItems:'flex-start'}}>
          {KANBAN_COLS.map(col=>{
            const colTasks = tasks.filter(t=>t.status===col);
            return (
              <div key={col} className="kanban-col" style={{flex:'0 0 240px'}}>
                <div className="kanban-col-hdr">
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{width:9,height:9,borderRadius:'50%',background:colColors[col],display:'inline-block'}}/>
                    <span style={{fontWeight:700,fontSize:13}}>{col}</span>
                  </div>
                  <span style={{background:'var(--surface)',borderRadius:20,padding:'1px 8px',fontSize:11,fontWeight:700,color:'var(--text3)'}}>{colTasks.length}</span>
                </div>
                <div style={{padding:'0 0 10px',overflowY:'auto',maxHeight:520}}>
                  {colTasks.map(t=>(
                    <div key={t.id} className="kanban-card" onClick={()=>setSelTask(t)}>
                      <div style={{fontWeight:700,fontSize:12.5,marginBottom:5}}>{t.name}</div>
                      <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                        <PriLabel p={t.priority}/>
                        {t.owner&&<span style={{fontSize:11,color:'var(--text3)'}}>👤 {t.owner}</span>}
                        {t.dueDate&&<span style={{fontSize:11,color:'var(--text3)'}}>📅 {t.dueDate}</span>}
                      </div>
                      {t.blocker&&<div style={{marginTop:6,padding:'4px 8px',background:'rgba(224,122,122,0.1)',borderRadius:6,fontSize:11,color:'#c05040'}}>⛔ {t.blocker}</div>}
                    </div>
                  ))}
                  {colTasks.length===0&&<div style={{textAlign:'center',padding:'16px 0',color:'var(--text3)',fontSize:12,opacity:0.6}}>Empty</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Task detail modal */}
      {selTask&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setSelTask(null)}>
          <div className="modal" style={{maxWidth:640}}>
            <div className="modal-hdr">
              <div style={{flex:1}}>
                <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:18,marginBottom:4}}>{selTask.name}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <StatusBadge status={selTask.status}/>
                  <PriLabel p={selTask.priority}/>
                  {selTask.dueDate&&<span style={{fontSize:12,color:'var(--text3)'}}>📅 {selTask.dueDate}</span>}
                </div>
              </div>
              <button className="modal-close" onClick={()=>setSelTask(null)}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                {[{l:'Owner',v:selTask.owner||'--'},{l:'Status',v:selTask.status},{l:'Next Action',v:selTask.nextAction||'--'},{l:'Blocker',v:selTask.blocker||'--'}].map(({l,v})=>(
                  <div key={l} style={{padding:'9px 12px',background:'var(--surface2)',borderRadius:10}}>
                    <div style={{fontSize:10.5,color:'var(--text3)',fontWeight:700,marginBottom:3}}>{l}</div>
                    <div style={{fontSize:13,fontWeight:600}}>{v}</div>
                  </div>
                ))}
              </div>
              {selTask.notes&&<div style={{padding:'10px 14px',background:'var(--surface2)',borderRadius:10,fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:14}}>{selTask.notes}</div>}
              {selTask.tags?.length>0&&<div style={{marginBottom:14}}>{selTask.tags.map(t=><Tag key={t} c={t}/>)}</div>}
              <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                <button className="btn btn-primary btn-sm" onClick={()=>toggleDone(selTask.id)}>{selTask.status==='Complete'?'↩ Reopen':'✅ Mark Done'}</button>
                <button className="btn btn-danger btn-sm" onClick={()=>delTask(selTask.id)}>Delete</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setSelTask(null)}>Close</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Add task modal */}
      {showModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal">
            <div className="modal-hdr"><div className="modal-title">Add Task</div><button className="modal-close" onClick={()=>setShowModal(false)}>✕</button></div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">Task Name *</label><input className="form-input" value={form.name} onChange={f('name')} placeholder="What needs to be done?"/></div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Client</label>
                  <select className="form-select" value={form.clientId} onChange={f('clientId')}>
                    <option value="">-- None --</option>
                    {(data.clients||[]).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
                <div className="form-group"><label className="form-label">Workflow</label>
                  <select className="form-select" value={form.workflowId} onChange={f('workflowId')}>
                    <option value="">-- None --</option>
                    {(data.workflows||[]).map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Priority</label>
                  <select className="form-select" value={form.priority} onChange={f('priority')}><option>High</option><option>Medium</option><option>Low</option></select>
                </div>
                <div className="form-group"><label className="form-label">Status</label>
                  <select className="form-select" value={form.status} onChange={f('status')}><option>Not Started</option><option>In Progress</option><option>Waiting</option><option>Blocked</option><option>Complete</option></select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Owner</label><input className="form-input" value={form.owner} onChange={f('owner')}/></div>
                <div className="form-group"><label className="form-label">Due Date</label><input className="form-input" type="date" value={form.dueDate} onChange={f('dueDate')}/></div>
              </div>
              <div className="form-group"><label className="form-label">Blocker</label><input className="form-input" value={form.blocker} onChange={f('blocker')} placeholder="What is blocking this?"/></div>
              <div className="form-group"><label className="form-label">Next Action</label><input className="form-input" value={form.nextAction} onChange={f('nextAction')}/></div>
              <div className="form-group"><label className="form-label">Notes</label><textarea className="form-textarea" value={form.notes} onChange={f('notes')} style={{minHeight:60}}/></div>
              <div className="form-group"><label className="form-label">Tags (comma-separated)</label><input className="form-input" value={form.tags} onChange={f('tags')} placeholder="email, credentials, urgent"/></div>
              <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:16}}>
                <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Cancel</button>
                <button className="btn btn-primary" onClick={addTask} disabled={!form.name}>Add Task</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Notes Page ────────────────────────────────────────────────
function NotesPage({data, update}) {
  const [quick, setQuick]   = useState('');
  const [qType, setQType]   = useState('general');
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');
  const notes = data.notes||[];
  const typeColors = {general:'var(--accent)',decision:'var(--accent2)',reminder:'var(--w-gold)',waiting:'#e4b86a',question:'var(--w-blush)',change:'#e07a7a'};

  const addNote = () => {
    if(!quick.trim()) return;
    update('notes',[{id:'n'+Date.now(),type:qType,clientId:'',workflowId:null,text:quick,date:new Date().toISOString().split('T')[0],pinned:false,tags:[]},...notes]);
    setQuick('');
  };
  const togglePin = id => update('notes',notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n));
  const del = id => update('notes',notes.filter(n=>n.id!==id));

  const filtered = notes.filter(n=>{
    const matchType = filter==='All'||n.type===filter||( filter==='Pinned'&&n.pinned);
    const matchSearch = !search || n.text.toLowerCase().includes(search.toLowerCase());
    return matchType&&matchSearch;
  });

  return (
    <div>
      <div className="quick-capture">
        <span style={{fontSize:20}}>✏️</span>
        <input placeholder="Quick capture -- what do you need to remember?" value={quick} onChange={e=>setQuick(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()}/>
        <select style={{border:'1px solid var(--border2)',borderRadius:8,padding:'5px 9px',fontSize:12,background:'var(--surface)',color:'var(--text2)',fontFamily:'var(--font)'}} value={qType} onChange={e=>setQType(e.target.value)}>
          {['general','decision','reminder','waiting','question','change'].map(t=><option key={t}>{t}</option>)}
        </select>
        <button className="btn btn-primary btn-sm" onClick={addNote}>Save</button>
      </div>
      <div style={{display:'flex',gap:7,marginBottom:16,alignItems:'center',flexWrap:'wrap'}}>
        {['All','Pinned','general','decision','reminder','waiting','question','change'].map(t=>(
          <button key={t} className={`btn btn-sm ${filter===t?'btn-primary':'btn-ghost'}`} onClick={()=>setFilter(t)} style={{textTransform:'capitalize'}}>{t}</button>
        ))}
        <input style={{marginLeft:'auto',padding:'6px 14px',border:'1.5px solid var(--border2)',borderRadius:50,fontSize:12.5,fontFamily:'var(--font)',background:'var(--surface)',color:'var(--text)',outline:'none'}} placeholder="Search notes..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
        {filtered.map(n=>(
          <div key={n.id} style={{background:'var(--surface)',borderLeft:`4px solid ${typeColors[n.type]||'var(--accent)'}`,borderRadius:'0 var(--r) var(--r) 0',padding:'12px 15px',boxShadow:'var(--shadow)',transition:'all 0.15s',borderTop:'1.5px solid var(--border)',borderRight:'1.5px solid var(--border)',borderBottom:'1.5px solid var(--border)'}}
            onMouseEnter={e=>e.currentTarget.style.transform='translateX(3px)'}
            onMouseLeave={e=>e.currentTarget.style.transform=''}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:10.5,color:typeColors[n.type]||'var(--text3)',fontWeight:700,textTransform:'capitalize'}}>{n.type}{n.pinned&&' 📌'}</span>
              <div style={{display:'flex',gap:4}}>
                <button onClick={()=>togglePin(n.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,opacity:0.5}} title={n.pinned?'Unpin':'Pin'}>📌</button>
                <button onClick={()=>del(n.id)} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,opacity:0.5,color:'#e07a7a'}}>✕</button>
              </div>
            </div>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:6}}>{n.text}</div>
            <div style={{fontSize:10.5,color:'var(--text3)'}}>{n.date}</div>
            {n.tags?.length>0&&<div style={{marginTop:7}}>{n.tags.map(t=><Tag key={t} c={t}/>)}</div>}
          </div>
        ))}
      </div>
      {filtered.length===0&&<div className="empty-state"><div className="empty-icon">📝</div><div className="empty-title">No notes found</div></div>}
    </div>
  );
}

// ── Docs Page ──────────────────────────────────────────────────

            <div className="modal-body">

              <div className="form-row">
                <div className="form-group"><label className="form-label">Type</label>

                </div>
                <div className="form-group"><label className="form-label">Client</label>
                  <select className="form-select" value={form.clientId} onChange={f('clientId')}>

        </div>

}

// ── Decisions Page ────────────────────────────────────────────
function DecisionsPage({data, update}) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({title:'',current:'',options:'',reason:'',decided:false,who:'',impact:''});
  const f = k => e => setForm(p=>({...p,[k]:e.target.value}));
  const decisions = data.decisions||[];

  const add = () => {
    update('decisions',[...decisions,{...form,id:'d'+Date.now(),date:new Date().toISOString().split('T')[0],options:form.options.split(',').map(o=>o.trim()).filter(Boolean),decided:form.decided==='true'||form.decided===true}]);
    setShowModal(false); setForm({title:'',current:'',options:'',reason:'',decided:false,who:'',impact:''});
  };
  const toggleDecided = id => update('decisions',decisions.map(d=>d.id===id?{...d,decided:!d.decided}:d));

  return (
    <div>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Log Decision</button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {decisions.map(d=>(
          <div key={d.id} className="decision-card">
            <div style={{display:'flex',alignItems:'flex-start',gap:14}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:'var(--font-h)',fontWeight:800,fontSize:15,marginBottom:8}}>{d.title}</div>
                <div style={{display:'flex',gap:7,marginBottom:10,flexWrap:'wrap'}}>
                  {(d.options||[]).map(o=>(
                    <span key={o} style={{padding:'3px 10px',borderRadius:20,fontSize:11.5,fontWeight:700,border:'1.5px solid',borderColor:d.current===o?'var(--accent)':'var(--border)',background:d.current===o?'color-mix(in srgb,var(--accent) 12%,white)':'var(--surface)',color:d.current===o?'var(--accent-d)':'var(--text3)'}}>
                      {o}{d.current===o&&' ✓'}
                    </span>
                  ))}
                </div>
                {d.reason&&<p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6,marginBottom:6}}>{d.reason}</p>}
